<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커뮤니티</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes slideDown {
      from { opacity: 0; max-height: 0; }
      to { opacity: 1; max-height: 600px; }
    }
    .slide-down { animation: slideDown 0.3s ease-out forwards; overflow: hidden; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
    .percent-bar { transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useCallback, useRef, useEffect } = React;

    // ========================================
    // Auth storage
    // ========================================
    const TOKEN_KEY = 'community_token';
    const getToken = () => localStorage.getItem(TOKEN_KEY);
    const setToken = (t) => localStorage.setItem(TOKEN_KEY, t);
    const clearToken = () => localStorage.removeItem(TOKEN_KEY);

    // ========================================
    // API
    // ========================================
    const API_BASE_URL = '/api';

    async function authFetch(path, options = {}) {
      const token = getToken();
      const headers = { ...(options.headers || {}) };
      if (options.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(`${API_BASE_URL}${path}`, { ...options, headers });
      return res.json();
    }

    const fetchPosts   = (sort = 'latest') => authFetch(`/posts?sort=${sort}`);
    const createPost   = (data) => authFetch('/posts', { method: 'POST', body: JSON.stringify(data) });
    const updatePost   = (id, data) => authFetch(`/posts/${id}`, { method: 'PATCH', body: JSON.stringify(data) });
    const likePost     = (id) => authFetch(`/posts/${id}/like`, { method: 'POST' });
    const deletePost   = (id) => authFetch(`/posts/${id}`, { method: 'DELETE' });

    const registerApi  = (data) => authFetch('/auth/register', { method: 'POST', body: JSON.stringify(data) });
    const loginApi     = (data) => authFetch('/auth/login', { method: 'POST', body: JSON.stringify(data) });
    const fetchMeApi   = () => authFetch('/auth/me');

    // ========================================
    // 카테고리 & 헬퍼
    // ========================================
    const CATEGORIES = [
      { key: 'all', label: '전체', emoji: '' },
      { key: '고민', label: '고민', emoji: '😔' },
      { key: '칭찬', label: '칭찬', emoji: '🌟' },
      { key: '응원', label: '응원', emoji: '💪' },
      { key: '잡담', label: '잡담', emoji: '💬' },
    ];

    const categoryMeta = {
      '고민': { label: '고민', emoji: '😔', color: 'bg-violet-100 text-violet-700' },
      '칭찬': { label: '칭찬', emoji: '🌟', color: 'bg-yellow-100 text-yellow-700' },
      '응원': { label: '응원', emoji: '💪', color: 'bg-green-100 text-green-700' },
      '잡담': { label: '잡담', emoji: '💬', color: 'bg-gray-100 text-gray-600' },
    };

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr);
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return '방금 전';
      if (mins < 60) return `${mins}분 전`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}시간 전`;
      return `${Math.floor(hours / 24)}일 전`;
    }

    // ========================================
    // Design System Components
    // ========================================
    function Badge({ emoji, label, colorClass, className = '' }) {
      return (
        <span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium ${colorClass} ${className}`}>
          {emoji && <span>{emoji}</span>}
          {label}
        </span>
      );
    }

    function Button({ children, variant = 'primary', size = 'md', disabled = false, onClick, className = '', type = 'button' }) {
      const base = 'inline-flex items-center justify-center font-medium transition-all duration-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-violet-300';
      const variants = {
        primary: 'bg-violet-500 text-white hover:bg-violet-600 active:bg-violet-700 disabled:bg-violet-300',
        secondary: 'bg-white text-violet-600 border-2 border-violet-400 hover:bg-violet-50 active:bg-violet-100 disabled:border-violet-200 disabled:text-violet-300',
        ghost: 'bg-transparent text-gray-500 hover:bg-gray-100 active:bg-gray-200 border border-gray-200',
        danger: 'bg-red-500 text-white hover:bg-red-600 active:bg-red-700 disabled:bg-red-300',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-4 py-2.5 text-sm',
        lg: 'px-6 py-3 text-base',
      };
      return (
        <button
          type={type}
          disabled={disabled}
          onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Input({ label, value, onChange, placeholder, className = '', maxLength, type = 'text', required = false }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-medium text-gray-600 mb-1.5">{label}</label>}
          <input
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            maxLength={maxLength}
            required={required}
            className="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-violet-400 focus:ring-2 focus:ring-violet-100 outline-none transition-all text-sm"
          />
        </div>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 ${className}`}>
          {children}
        </div>
      );
    }

    // ========================================
    // Auth Screen
    // ========================================
    function AuthScreen({ onAuthed }) {
      const [mode, setMode] = useState('login'); // 'login' | 'register'
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [name, setName] = useState('');
      const [error, setError] = useState('');
      const [submitting, setSubmitting] = useState(false);

      const isRegister = mode === 'register';

      const submit = async (e) => {
        e.preventDefault();
        setError('');
        setSubmitting(true);
        try {
          const fn = isRegister ? registerApi : loginApi;
          const payload = isRegister ? { email, password, name } : { email, password };
          const res = await fn(payload);
          if (!res.success) {
            setError(res.message || '오류가 발생했어요');
            return;
          }
          setToken(res.data.token);
          onAuthed(res.data.user);
        } catch (err) {
          setError('네트워크 오류');
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center px-4">
          <div className="w-full max-w-sm">
            <div className="text-center mb-8">
              <div className="text-5xl mb-2">💜</div>
              <h1 className="text-2xl font-bold text-gray-800">커뮤니티</h1>
              <p className="text-sm text-gray-500 mt-1">로그인하고 글을 남겨보세요</p>
            </div>

            <Card className="p-6">
              <div className="flex gap-1 bg-gray-100 rounded-xl p-1 mb-5">
                <button
                  onClick={() => { setMode('login'); setError(''); }}
                  className={`flex-1 py-2 text-sm font-medium rounded-lg transition-all ${
                    !isRegister ? 'bg-white text-violet-600 shadow-sm' : 'text-gray-400'
                  }`}
                >로그인</button>
                <button
                  onClick={() => { setMode('register'); setError(''); }}
                  className={`flex-1 py-2 text-sm font-medium rounded-lg transition-all ${
                    isRegister ? 'bg-white text-violet-600 shadow-sm' : 'text-gray-400'
                  }`}
                >회원가입</button>
              </div>

              <form onSubmit={submit} className="space-y-3">
                {isRegister && (
                  <Input
                    label="이름"
                    value={name}
                    onChange={e => setName(e.target.value)}
                    placeholder="홍길동"
                    maxLength={100}
                  />
                )}
                <Input
                  label="이메일"
                  type="email"
                  value={email}
                  onChange={e => setEmail(e.target.value)}
                  placeholder="you@example.com"
                  required
                />
                <Input
                  label="비밀번호"
                  type="password"
                  value={password}
                  onChange={e => setPassword(e.target.value)}
                  placeholder={isRegister ? '8자 이상' : ''}
                  required
                />

                {error && (
                  <div className="text-sm text-red-500 bg-red-50 px-3 py-2 rounded-lg">{error}</div>
                )}

                <Button type="submit" variant="primary" size="lg" className="w-full" disabled={submitting}>
                  {submitting ? '처리 중...' : (isRegister ? '회원가입' : '로그인')}
                </Button>
              </form>
            </Card>
          </div>
        </div>
      );
    }

    // ========================================
    // Common / Layout Components
    // ========================================
    function Header({ user, onLogout }) {
      return (
        <header className="bg-violet-500 text-white px-4 py-4 shadow-md sticky top-0 z-50">
          <div className="max-w-lg mx-auto flex items-center gap-2">
            <span className="text-2xl">💜</span>
            <h1 className="text-lg font-bold tracking-tight">커뮤니티</h1>
            <div className="ml-auto flex items-center gap-2">
              <span className="text-xs opacity-90 hidden sm:inline">{user.name || user.email}</span>
              <button
                onClick={onLogout}
                className="text-xs px-3 py-1.5 rounded-full bg-white/20 hover:bg-white/30 transition-colors font-medium"
              >
                로그아웃
              </button>
            </div>
          </div>
        </header>
      );
    }

    function CategoryTabs({ active, onChange }) {
      const scrollRef = useRef(null);
      return (
        <div className="bg-white border-b border-gray-100 sticky top-[56px] z-40">
          <div className="max-w-lg mx-auto">
            <div ref={scrollRef} className="flex gap-1 px-3 py-2 overflow-x-auto hide-scrollbar">
              {CATEGORIES.map(cat => {
                const isActive = active === cat.key;
                return (
                  <button
                    key={cat.key}
                    onClick={() => onChange(cat.key)}
                    className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 ${
                      isActive
                        ? 'bg-violet-500 text-white shadow-sm'
                        : 'bg-gray-100 text-gray-500 hover:bg-gray-200'
                    }`}
                  >
                    {cat.emoji && <span className="mr-1">{cat.emoji}</span>}
                    {cat.label}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function SortTabs({ active, onChange }) {
      const tabs = [
        { key: 'latest', label: '최신순' },
        { key: 'likes', label: '공감순' },
      ];
      return (
        <div className="max-w-lg mx-auto px-4 mt-4">
          <div className="flex gap-1 bg-gray-100 rounded-xl p-1">
            {tabs.map(tab => (
              <button
                key={tab.key}
                onClick={() => onChange(tab.key)}
                className={`flex-1 py-2 text-sm font-medium rounded-lg transition-all duration-200 ${
                  active === tab.key
                    ? 'bg-white text-violet-600 shadow-sm'
                    : 'text-gray-400 hover:text-gray-600'
                }`}
              >
                {tab.label}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ========================================
    // 글 작성 폼
    // ========================================
    function CreatePostForm({ onSubmit }) {
      const [isOpen, setIsOpen] = useState(false);
      const [content, setContent] = useState('');
      const [category, setCategory] = useState('고민');

      const catOptions = CATEGORIES.filter(c => c.key !== 'all');

      const resetForm = () => {
        setContent('');
        setCategory('고민');
        setIsOpen(false);
      };

      const handleSubmit = useCallback((e) => {
        e.preventDefault();
        if (!content.trim()) return;
        onSubmit({ category, content: content.trim() });
        resetForm();
      }, [content, category, onSubmit]);

      return (
        <div className="max-w-lg mx-auto px-4 mt-4">
          <Card>
            <div className="flex items-center gap-2 px-4 py-3">
              <button
                onClick={() => setIsOpen(!isOpen)}
                className="flex-1 flex items-center gap-2 text-sm font-semibold text-gray-700 hover:text-violet-600 transition-colors"
              >
                <span className="text-violet-500 text-lg">+</span>
                새 글 작성하기
                <svg className={`w-4 h-4 text-gray-400 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`}
                  fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                </svg>
              </button>
            </div>

            {isOpen && (
              <div className="px-5 pb-5 pt-1 slide-down">
                <form onSubmit={handleSubmit}>
                  <div className="space-y-3">
                    <div>
                      <label className="block text-sm font-medium text-gray-600 mb-1.5">카테고리</label>
                      <div className="flex gap-2 flex-wrap">
                        {catOptions.map(cat => {
                          const isActive = category === cat.key;
                          return (
                            <button
                              key={cat.key}
                              type="button"
                              onClick={() => setCategory(cat.key)}
                              className={`px-3 py-1.5 rounded-full text-xs font-medium transition-all duration-200 border-2 ${
                                isActive
                                  ? 'border-violet-500 bg-violet-50 text-violet-700'
                                  : 'border-gray-200 bg-white text-gray-500 hover:border-gray-300'
                              }`}
                            >
                              {cat.emoji} {cat.label}
                            </button>
                          );
                        })}
                      </div>
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-violet-600 mb-1.5">내용</label>
                      <textarea
                        value={content}
                        onChange={e => setContent(e.target.value)}
                        placeholder="자유롭게 작성해보세요..."
                        maxLength={500}
                        rows={4}
                        required
                        className="w-full px-4 py-2.5 rounded-xl border-2 border-violet-200 bg-violet-50/30 focus:bg-white focus:border-violet-400 focus:ring-2 focus:ring-violet-100 outline-none transition-all text-sm resize-none"
                      />
                      <div className="text-right mt-1">
                        <span className="text-xs text-gray-400">{content.length}/500</span>
                      </div>
                    </div>

                    <div className="flex gap-2">
                      <Button variant="ghost" size="md" className="flex-1" onClick={resetForm}>
                        취소
                      </Button>
                      <Button type="submit" variant="primary" size="md" className="flex-1" disabled={!content.trim()}>
                        등록하기
                      </Button>
                    </div>
                  </div>
                </form>
              </div>
            )}
          </Card>
        </div>
      );
    }

    // ========================================
    // 게시글 카드
    // ========================================
    function PostCard({ post, liked, isOwner, onLike, onDelete, onEdit }) {
      const { id, category, content, likes, created_at, author_name } = post;
      const meta = categoryMeta[category] || { label: category, emoji: '❓', color: 'bg-gray-100 text-gray-600' };
      const [deleting, setDeleting] = useState(false);
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState(content);
      const [savingEdit, setSavingEdit] = useState(false);

      const handleDelete = async () => {
        if (!confirm('이 글을 삭제할까요?')) return;
        setDeleting(true);
        await onDelete(id);
      };

      const startEdit = () => { setDraft(content); setEditing(true); };
      const cancelEdit = () => { setEditing(false); setDraft(content); };
      const saveEdit = async () => {
        if (!draft.trim() || draft.trim() === content) { setEditing(false); return; }
        setSavingEdit(true);
        const res = await onEdit(id, { content: draft.trim() });
        setSavingEdit(false);
        if (res?.success) setEditing(false);
      };

      return (
        <Card className="fade-in-up">
          <div className="p-5">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2">
                <Badge emoji={meta.emoji} label={meta.label} colorClass={meta.color} />
                <span className="text-xs font-medium text-gray-500">
                  {author_name || (post.user_id ? '익명' : '익명(게스트)')}
                </span>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-xs text-gray-400">{timeAgo(created_at)}</span>
                {isOwner && !editing && (
                  <>
                    <button
                      onClick={startEdit}
                      className="w-6 h-6 flex items-center justify-center rounded-full text-gray-300 hover:bg-violet-50 hover:text-violet-500 transition-colors"
                      title="글 수정"
                      aria-label="글 수정"
                    >
                      <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                      </svg>
                    </button>
                    <button
                      onClick={handleDelete}
                      disabled={deleting}
                      className="w-6 h-6 flex items-center justify-center rounded-full text-gray-300 hover:bg-red-50 hover:text-red-400 transition-colors disabled:opacity-40"
                      title="글 삭제"
                      aria-label="글 삭제"
                    >
                      {deleting ? (
                        <span className="w-3 h-3 border-2 border-red-300 border-t-transparent rounded-full animate-spin inline-block" />
                      ) : (
                        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                      )}
                    </button>
                  </>
                )}
              </div>
            </div>

            {editing ? (
              <div className="mb-4 space-y-2">
                <textarea
                  value={draft}
                  onChange={e => setDraft(e.target.value)}
                  maxLength={500}
                  rows={4}
                  className="w-full px-4 py-2.5 rounded-xl border-2 border-violet-200 bg-violet-50/30 focus:bg-white focus:border-violet-400 focus:ring-2 focus:ring-violet-100 outline-none transition-all text-sm resize-none"
                />
                <div className="flex gap-2">
                  <Button variant="ghost" size="sm" className="flex-1" onClick={cancelEdit}>취소</Button>
                  <Button variant="primary" size="sm" className="flex-1" onClick={saveEdit} disabled={savingEdit || !draft.trim()}>
                    {savingEdit ? '저장 중...' : '저장'}
                  </Button>
                </div>
              </div>
            ) : (
              <p className="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap mb-4">{content}</p>
            )}

            <div className="flex items-center">
              <button
                onClick={() => onLike(id)}
                className={`inline-flex items-center gap-1.5 px-3.5 py-2 rounded-full text-sm font-medium transition-all duration-200 ${
                  liked
                    ? 'bg-violet-100 text-violet-600 border-2 border-violet-300'
                    : 'bg-gray-50 text-gray-400 border-2 border-gray-100 hover:bg-violet-50 hover:text-violet-500 hover:border-violet-200'
                }`}
              >
                <span>💜</span>
                <span>{likes || 0}명 공감</span>
              </button>
            </div>
          </div>
        </Card>
      );
    }

    // ========================================
    // 인기 게시글 섹션 (공감 TOP 3)
    // ========================================
    function PopularSection({ posts }) {
      const ranked = useMemo(() => {
        return [...posts]
          .filter(p => (p.likes || 0) > 0)
          .sort((a, b) => (b.likes || 0) - (a.likes || 0))
          .slice(0, 3);
      }, [posts]);

      if (ranked.length === 0) return null;

      const medals = ['🥇', '🥈', '🥉'];

      return (
        <div className="max-w-lg mx-auto px-4 mt-6 mb-2">
          <h2 className="text-sm font-bold text-gray-700 mb-3 flex items-center gap-1.5">
            <span>🔥</span> 공감 TOP 3
          </h2>
          <Card>
            <div className="divide-y divide-gray-50">
              {ranked.map((p, i) => {
                const meta = categoryMeta[p.category] || { label: p.category, emoji: '❓', color: '' };
                return (
                  <div key={p.id} className="flex items-center gap-3 px-4 py-3">
                    <span className="text-lg flex-shrink-0 w-7 text-center">{medals[i]}</span>
                    <div className="flex-1 min-w-0">
                      <p className="text-sm font-medium text-gray-700 truncate">
                        {p.content}
                      </p>
                      <p className="text-xs text-gray-400 mt-0.5">
                        {meta.emoji} {meta.label} · {p.author_name || '익명'}
                      </p>
                    </div>
                    <div className="text-right flex-shrink-0">
                      <p className="text-sm font-bold text-violet-600">{p.likes || 0}</p>
                      <p className="text-[10px] text-gray-400">공감</p>
                    </div>
                  </div>
                );
              })}
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);

      const [posts, setPosts] = useState([]);
      const [likedPosts, setLikedPosts] = useState({});
      const [activeCategory, setActiveCategory] = useState('all');
      const [sortMode, setSortMode] = useState('latest');
      const [loading, setLoading] = useState(true);

      // 초기 부팅: 토큰이 있으면 /me 호출해서 자동 로그인
      useEffect(() => {
        (async () => {
          if (!getToken()) { setAuthLoading(false); return; }
          const res = await fetchMeApi();
          if (res.success) setUser(res.data);
          else clearToken();
          setAuthLoading(false);
        })();
      }, []);

      const loadPosts = useCallback(async (sort) => {
        setLoading(true);
        try {
          const res = await fetchPosts(sort);
          if (res.success) setPosts(res.data);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        if (user) loadPosts(sortMode);
      }, [sortMode, user, loadPosts]);

      const handleLike = useCallback(async (postId) => {
        if (likedPosts[postId]) return;
        setLikedPosts(prev => ({ ...prev, [postId]: true }));
        setPosts(prev =>
          prev.map(p => p.id === postId ? { ...p, likes: (p.likes || 0) + 1 } : p)
        );
        await likePost(postId);
      }, [likedPosts]);

      const handleCreatePost = useCallback(async (data) => {
        const res = await createPost(data);
        if (res.success) {
          // author_name 채우기 (서버 응답엔 없으므로 클라에서 주입)
          setPosts(prev => [{ ...res.data, author_name: user.name, author_email: user.email }, ...prev]);
        } else {
          alert(res.message || '글 작성 실패');
        }
      }, [user]);

      const handleEditPost = useCallback(async (id, data) => {
        const res = await updatePost(id, data);
        if (res.success) {
          setPosts(prev => prev.map(p => p.id === id ? { ...p, ...res.data, author_name: p.author_name, author_email: p.author_email } : p));
        } else {
          alert(res.message || '수정 실패');
        }
        return res;
      }, []);

      const handleDeletePost = useCallback(async (id) => {
        const res = await deletePost(id);
        if (res.success) {
          setPosts(prev => prev.filter(p => p.id !== id));
        } else {
          alert(res.message || '삭제 실패');
        }
      }, []);

      const handleLogout = useCallback(() => {
        clearToken();
        setUser(null);
        setPosts([]);
        setLikedPosts({});
      }, []);

      const filteredPosts = useMemo(() => {
        if (activeCategory === 'all') return posts;
        return posts.filter(p => p.category === activeCategory);
      }, [posts, activeCategory]);

      if (authLoading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="w-8 h-8 border-4 border-violet-500 border-t-transparent rounded-full animate-spin" />
          </div>
        );
      }

      if (!user) {
        return <AuthScreen onAuthed={setUser} />;
      }

      return (
        <div className="min-h-screen bg-slate-100 pb-8">
          <Header user={user} onLogout={handleLogout} />
          <CategoryTabs active={activeCategory} onChange={setActiveCategory} />
          <CreatePostForm onSubmit={handleCreatePost} />
          <SortTabs active={sortMode} onChange={setSortMode} />

          <div className="max-w-lg mx-auto px-4 mt-4 space-y-4">
            {loading ? (
              <div className="flex justify-center py-12">
                <div className="w-8 h-8 border-4 border-violet-500 border-t-transparent rounded-full animate-spin" />
              </div>
            ) : filteredPosts.length === 0 ? (
              <Card className="p-8 text-center">
                <p className="text-3xl mb-2">💜</p>
                <p className="text-sm text-gray-400">아직 글이 없어요</p>
                <p className="text-xs text-gray-300 mt-1">첫 번째 글을 작성해보세요!</p>
              </Card>
            ) : (
              filteredPosts.map(p => (
                <PostCard
                  key={p.id}
                  post={p}
                  liked={!!likedPosts[p.id]}
                  isOwner={p.user_id === user.id}
                  onLike={handleLike}
                  onDelete={handleDeletePost}
                  onEdit={handleEditPost}
                />
              ))
            )}
          </div>

          <PopularSection posts={posts} />
          <div className="h-4" />
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
