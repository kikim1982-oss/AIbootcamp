<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    input[type="color"] {
      -webkit-appearance: none;
      border: none;
      cursor: pointer;
    }
    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    input[type="color"]::-webkit-color-swatch {
      border: 2px solid rgba(0,0,0,0.1);
      border-radius: 50%;
    }
    .swatch-enter {
      animation: swatchIn 0.3s ease-out forwards;
    }
    @keyframes swatchIn {
      from { opacity: 0; transform: translateY(12px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes copiedPop {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .copied-pop {
      animation: copiedPop 0.3s ease-out forwards;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useCallback, useRef, useEffect } = React;

    // ========================================
    // Color Utility Functions
    // ========================================
    function hexToHsl(hex) {
      let r = parseInt(hex.slice(1, 3), 16) / 255;
      let g = parseInt(hex.slice(3, 5), 16) / 255;
      let b = parseInt(hex.slice(5, 7), 16) / 255;

      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;

      if (max === min) {
        h = s = 0;
      } else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
          case g: h = ((b - r) / d + 2) / 6; break;
          case b: h = ((r - g) / d + 4) / 6; break;
        }
      }
      return { h: h * 360, s: s * 100, l: l * 100 };
    }

    function hslToHex(h, s, l) {
      s /= 100;
      l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = (n) => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * Math.max(0, Math.min(1, color)))
          .toString(16)
          .padStart(2, '0');
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    function hexToRgb(hex) {
      return {
        r: parseInt(hex.slice(1, 3), 16),
        g: parseInt(hex.slice(3, 5), 16),
        b: parseInt(hex.slice(5, 7), 16),
      };
    }

    function generatePalette(hex) {
      const { h, s, l } = hexToHsl(hex);
      const palette = [];

      // 3 darker shades (progressively darker)
      for (let i = 3; i >= 1; i--) {
        const newL = Math.max(0, l - i * (l / 4));
        const color = hslToHex(h, s, newL);
        palette.push({ hex: color, rgb: hexToRgb(color), isBase: false, label: `${i * 25}% darker` });
      }

      // Base color
      palette.push({ hex: hex.toLowerCase(), rgb: hexToRgb(hex), isBase: true, label: 'Base' });

      // 3 lighter tints (progressively lighter)
      for (let i = 1; i <= 3; i++) {
        const remaining = 100 - l;
        const newL = Math.min(100, l + i * (remaining / 4));
        const color = hslToHex(h, s, newL);
        palette.push({ hex: color, rgb: hexToRgb(color), isBase: false, label: `${i * 25}% lighter` });
      }

      return palette;
    }

    function getContrastColor(hex) {
      const { r, g, b } = hexToRgb(hex);
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.55 ? '#1a1a1a' : '#ffffff';
    }

    // ========================================
    // Design System Components
    // ========================================
    function ColorSwatch({ color, index, onCopy }) {
      const [copied, setCopied] = useState(false);
      const textColor = getContrastColor(color.hex);
      const subtextColor = textColor === '#ffffff' ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.5)';

      const handleClick = useCallback(() => {
        navigator.clipboard.writeText(color.hex).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        });
      }, [color.hex]);

      return (
        <div
          className="swatch-enter cursor-pointer group relative"
          style={{ animationDelay: `${index * 50}ms` }}
          onClick={handleClick}
          role="button"
          tabIndex={0}
          aria-label={`${color.hex} - click to copy`}
          onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') handleClick(); }}
        >
          <div
            className={`rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 hover:-translate-y-1 overflow-hidden ${
              color.isBase ? 'ring-4 ring-offset-2 ring-blue-500' : ''
            }`}
          >
            <div
              className="h-36 sm:h-44 flex items-end p-4 relative"
              style={{ backgroundColor: color.hex }}
            >
              {color.isBase && (
                <span
                  className="absolute top-3 right-3 text-xs font-semibold px-2.5 py-1 rounded-full"
                  style={{
                    backgroundColor: textColor === '#ffffff' ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.1)',
                    color: textColor,
                  }}
                >
                  BASE
                </span>
              )}
              <span
                className="text-xs font-medium px-2 py-0.5 rounded-full"
                style={{
                  backgroundColor: textColor === '#ffffff' ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.08)',
                  color: subtextColor,
                }}
              >
                {color.label}
              </span>

              {copied && (
                <div className="absolute inset-0 flex items-center justify-center" style={{ backgroundColor: 'rgba(0,0,0,0.3)' }}>
                  <span className="copied-pop bg-white text-gray-900 font-semibold text-sm px-4 py-2 rounded-full shadow-lg">
                    Copied!
                  </span>
                </div>
              )}
            </div>

            <div className="bg-white px-4 py-3">
              <p className="font-mono font-semibold text-gray-800 text-sm tracking-wide uppercase">
                {color.hex}
              </p>
              <p className="font-mono text-gray-400 text-xs mt-0.5">
                rgb({color.rgb.r}, {color.rgb.g}, {color.rgb.b})
              </p>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      const [baseColor, setBaseColor] = useState('#3b82f6');
      const [hexInput, setHexInput] = useState('#3b82f6');
      const [palette, setPalette] = useState(() => generatePalette('#3b82f6'));
      const [paletteKey, setPaletteKey] = useState(0);

      const updateColor = useCallback((newColor) => {
        const normalized = newColor.toLowerCase();
        setBaseColor(normalized);
        setHexInput(normalized);
        setPalette(generatePalette(normalized));
        setPaletteKey((k) => k + 1);
      }, []);

      const handlePickerChange = (e) => {
        updateColor(e.target.value);
      };

      const handleHexInputChange = (e) => {
        const val = e.target.value;
        setHexInput(val);
        if (/^#[0-9a-fA-F]{6}$/.test(val)) {
          updateColor(val);
        }
      };

      const randomColor = () => {
        const hex = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
        updateColor(hex);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100">
          {/* Header */}
          <header className="pt-12 pb-8 px-4 text-center">
            <h1 className="text-4xl sm:text-5xl font-bold text-gray-900 tracking-tight">
              Color Palette Generator
            </h1>
            <p className="mt-3 text-gray-500 text-lg">
              Pick a color to generate shades and tints
            </p>
          </header>

          {/* Controls */}
          <div className="max-w-xl mx-auto px-4 pb-10">
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col sm:flex-row items-center gap-5">
              <input
                type="color"
                value={baseColor}
                onChange={handlePickerChange}
                className="w-16 h-16 rounded-full flex-shrink-0"
                aria-label="Pick a color"
              />

              <div className="flex-1 w-full">
                <label className="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">
                  HEX
                </label>
                <input
                  type="text"
                  value={hexInput}
                  onChange={handleHexInputChange}
                  maxLength={7}
                  className="w-full font-mono text-lg font-semibold text-gray-800 bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                  placeholder="#3b82f6"
                  spellCheck={false}
                />
              </div>

              <button
                onClick={randomColor}
                className="flex-shrink-0 bg-gray-900 hover:bg-gray-700 text-white font-medium px-5 py-2.5 rounded-xl transition-colors duration-200 text-sm"
                aria-label="Generate random color"
              >
                Random
              </button>
            </div>
          </div>

          {/* Palette Grid */}
          <div className="max-w-6xl mx-auto px-4 pb-16">
            <div
              key={paletteKey}
              className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-4"
            >
              {palette.map((color, index) => (
                <ColorSwatch key={`${paletteKey}-${index}`} color={color} index={index} />
              ))}
            </div>

            <p className="text-center text-gray-400 text-sm mt-8">
              Click any swatch to copy its HEX code
            </p>
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
