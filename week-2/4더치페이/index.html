<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>더치페이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eef2ff',
              100: '#e0e7ff',
              200: '#c7d2fe',
              300: '#a5b4fc',
              400: '#818cf8',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              800: '#3730a3',
              900: '#312e81',
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .toast-slide {
      animation: toastSlide 0.3s ease-out;
    }
    @keyframes toastSlide {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useMemo, useRef, useEffect } = React;

    // ========================================
    // 1. Utility Functions
    // ========================================

    function formatNumber(num) {
      if (num === 0) return '0';
      return num.toLocaleString('ko-KR');
    }

    function parseInputNumber(str) {
      const cleaned = str.replace(/,/g, '').replace(/[^0-9]/g, '');
      return cleaned === '' ? 0 : parseInt(cleaned, 10);
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    }

    // ========================================
    // 2. Design System Components
    // ========================================

    function Button({ children, variant = 'primary', size = 'md', disabled = false, onClick, className = '', type = 'button' }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-xl transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-brand-600 text-white hover:bg-brand-700 active:bg-brand-800 shadow-md hover:shadow-lg',
        secondary: 'bg-white text-brand-700 border-2 border-brand-200 hover:bg-brand-50 hover:border-brand-300',
        danger: 'bg-red-500 text-white hover:bg-red-600 active:bg-red-700',
        ghost: 'text-gray-500 hover:text-gray-700 hover:bg-gray-100',
        success: 'bg-emerald-500 text-white hover:bg-emerald-600 shadow-md',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm gap-1.5',
        md: 'px-5 py-2.5 text-sm gap-2',
        lg: 'px-6 py-3 text-base gap-2',
      };
      return (
        <button type={type} disabled={disabled} onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>
          {children}
        </button>
      );
    }

    function Input({ label, value, onChange, placeholder, type = 'text', error, disabled = false, className = '', prefix, suffix, inputClassName = '' }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-medium text-gray-700 mb-1.5">{label}</label>}
          <div className="relative flex items-center">
            {prefix && <span className="absolute left-3 text-gray-400 text-sm pointer-events-none">{prefix}</span>}
            <input
              type={type}
              value={value}
              onChange={onChange}
              placeholder={placeholder}
              disabled={disabled}
              className={`w-full rounded-xl border-2 border-gray-200 px-4 py-2.5 text-gray-900 placeholder-gray-400
                focus:border-brand-500 focus:ring-0 focus:outline-none transition-colors duration-200
                disabled:bg-gray-100 disabled:cursor-not-allowed
                ${prefix ? 'pl-8' : ''} ${suffix ? 'pr-12' : ''}
                ${error ? 'border-red-400 focus:border-red-500' : ''}
                ${inputClassName}`}
            />
            {suffix && <span className="absolute right-3 text-gray-400 text-sm pointer-events-none">{suffix}</span>}
          </div>
          {error && <p className="mt-1 text-sm text-red-500">{error}</p>}
        </div>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 p-6 ${className}`}>
          {children}
        </div>
      );
    }

    function Badge({ children, variant = 'default', className = '' }) {
      const variants = {
        default: 'bg-gray-100 text-gray-700',
        brand: 'bg-brand-100 text-brand-700',
        success: 'bg-emerald-100 text-emerald-700',
        warning: 'bg-amber-100 text-amber-700',
        danger: 'bg-red-100 text-red-700',
      };
      return (
        <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium ${variants[variant]} ${className}`}>
          {children}
        </span>
      );
    }

    function Toast({ message, show }) {
      if (!show) return null;
      return (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 toast-slide">
          <div className="bg-gray-900 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-2 text-sm">
            <svg className="w-4 h-4 text-emerald-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
            </svg>
            {message}
          </div>
        </div>
      );
    }

    // ========================================
    // 3. Icon Components
    // ========================================

    function IconUsers() {
      return (
        <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5}
            d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
        </svg>
      );
    }

    function IconCopy() {
      return (
        <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
            d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
        </svg>
      );
    }

    function IconPlus() {
      return (
        <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
        </svg>
      );
    }

    function IconTrash() {
      return (
        <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      );
    }

    function IconReset() {
      return (
        <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
      );
    }

    // ========================================
    // 4. Tab Component
    // ========================================

    function TabSwitcher({ activeTab, onTabChange }) {
      const tabs = [
        { id: 'equal', label: 'N분의 1', desc: '균등 분할' },
        { id: 'unequal', label: '개별 정산', desc: '차등 분할' },
      ];
      return (
        <div className="flex bg-gray-100 rounded-xl p-1 gap-1">
          {tabs.map(tab => (
            <button key={tab.id} onClick={() => onTabChange(tab.id)}
              className={`flex-1 py-3 px-4 rounded-lg text-sm font-medium transition-all duration-200
                ${activeTab === tab.id
                  ? 'bg-white text-brand-700 shadow-sm'
                  : 'text-gray-500 hover:text-gray-700'}`}>
              <div className="font-semibold">{tab.label}</div>
              <div className="text-xs mt-0.5 opacity-70">{tab.desc}</div>
            </button>
          ))}
        </div>
      );
    }

    // ========================================
    // 5. Equal Split Component
    // ========================================

    function EqualSplit({ totalAmount, setTotalAmount }) {
      const [peopleCount, setPeopleCount] = useState('');
      const [totalInput, setTotalInput] = useState('');
      const [showToast, setShowToast] = useState(false);

      const total = parseInputNumber(totalInput);
      const people = parseInt(peopleCount) || 0;

      const perPerson = useMemo(() => {
        if (total <= 0 || people <= 0) return 0;
        return Math.ceil(total / people);
      }, [total, people]);

      const remainder = useMemo(() => {
        if (total <= 0 || people <= 0) return 0;
        return (perPerson * people) - total;
      }, [total, people, perPerson]);

      useEffect(() => {
        setTotalAmount(total);
      }, [total]);

      const handleTotalChange = (e) => {
        const raw = e.target.value.replace(/,/g, '').replace(/[^0-9]/g, '');
        if (raw === '') { setTotalInput(''); return; }
        const num = parseInt(raw);
        setTotalInput(num.toLocaleString('ko-KR'));
      };

      const copyResult = useCallback(() => {
        if (perPerson <= 0) return;
        const text = [
          `[ 더치페이 정산 ]`,
          `총 금액: ${formatNumber(total)}원`,
          `인원: ${people}명`,
          `1인당: ${formatNumber(perPerson)}원`,
          remainder > 0 ? `(1명이 ${formatNumber(remainder)}원 덜 냄)` : '',
        ].filter(Boolean).join('\n');
        navigator.clipboard.writeText(text).then(() => {
          setShowToast(true);
          setTimeout(() => setShowToast(false), 2000);
        });
      }, [total, people, perPerson, remainder]);

      return (
        <div className="space-y-5 fade-in">
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <Input label="총 금액" value={totalInput} onChange={handleTotalChange}
              placeholder="0" suffix="원" />
            <Input label="인원 수" value={peopleCount}
              onChange={(e) => setPeopleCount(e.target.value.replace(/[^0-9]/g, ''))}
              placeholder="0" suffix="명" />
          </div>

          {total > 0 && people > 0 && (
            <Card className="bg-gradient-to-br from-brand-50 to-indigo-50 border-brand-100 fade-in">
              <div className="text-center">
                <p className="text-sm text-brand-600 font-medium mb-1">1인당 금액</p>
                <p className="text-4xl font-bold text-brand-700">
                  {formatNumber(perPerson)}<span className="text-lg font-medium ml-1">원</span>
                </p>
                {remainder > 0 && (
                  <p className="text-xs text-brand-500 mt-2">
                    * 올림 적용 (1명이 {formatNumber(remainder)}원 덜 내면 됩니다)
                  </p>
                )}
              </div>
              <div className="mt-5 pt-4 border-t border-brand-100 flex flex-wrap gap-2 justify-center">
                {Array.from({ length: people }, (_, i) => (
                  <Badge key={i} variant="brand">
                    {i + 1}번: {formatNumber(i === people - 1 && remainder > 0 ? perPerson - remainder : perPerson)}원
                  </Badge>
                ))}
              </div>
              <div className="mt-5 flex justify-center">
                <Button variant="secondary" size="sm" onClick={copyResult}>
                  <IconCopy /> 결과 복사
                </Button>
              </div>
            </Card>
          )}

          <Toast message="클립보드에 복사되었습니다!" show={showToast} />
        </div>
      );
    }

    // ========================================
    // 6. Unequal Split Component
    // ========================================

    function UnequalSplit() {
      const [members, setMembers] = useState([]);
      const [newName, setNewName] = useState('');
      const [discountInput, setDiscountInput] = useState('');
      const [splitMode, setSplitMode] = useState('individual'); // 'individual' | 'equal'
      const [showToast, setShowToast] = useState(false);
      const nameInputRef = useRef(null);

      const discount = parseInputNumber(discountInput);

      const handleDiscountChange = (e) => {
        const raw = e.target.value.replace(/,/g, '').replace(/[^0-9]/g, '');
        if (raw === '') { setDiscountInput(''); return; }
        const num = parseInt(raw);
        setDiscountInput(num.toLocaleString('ko-KR'));
      };

      const addMember = useCallback(() => {
        const name = newName.trim();
        if (!name) return;
        if (members.some(m => m.name === name)) return;
        setMembers(prev => [...prev, { id: generateId(), name, items: [] }]);
        setNewName('');
        nameInputRef.current?.focus();
      }, [newName, members]);

      const removeMember = useCallback((id) => {
        setMembers(prev => prev.filter(m => m.id !== id));
      }, []);

      const addItem = useCallback((memberId) => {
        setMembers(prev => prev.map(m =>
          m.id === memberId
            ? { ...m, items: [...m.items, { id: generateId(), name: '', amount: 0, amountInput: '' }] }
            : m
        ));
      }, []);

      const updateItem = useCallback((memberId, itemId, field, value) => {
        setMembers(prev => prev.map(m =>
          m.id === memberId
            ? {
              ...m,
              items: m.items.map(it => {
                if (it.id !== itemId) return it;
                if (field === 'amount') {
                  const raw = value.replace(/,/g, '').replace(/[^0-9]/g, '');
                  const num = raw === '' ? 0 : parseInt(raw);
                  return { ...it, amount: num, amountInput: raw === '' ? '' : num.toLocaleString('ko-KR') };
                }
                return { ...it, [field]: value };
              })
            }
            : m
        ));
      }, []);

      const removeItem = useCallback((memberId, itemId) => {
        setMembers(prev => prev.map(m =>
          m.id === memberId
            ? { ...m, items: m.items.filter(it => it.id !== itemId) }
            : m
        ));
      }, []);

      const getMemberRaw = useCallback((member) => {
        return member.items.reduce((sum, it) => sum + it.amount, 0);
      }, []);

      // 전체 메뉴 합계 (할인 전)
      const grandTotal = useMemo(() => {
        return members.reduce((sum, m) => sum + getMemberRaw(m), 0);
      }, [members, getMemberRaw]);

      // 할인 후 최종 결제금액
      const finalTotal = Math.max(0, grandTotal - discount);

      // 전체 메뉴 목록 (모든 인원의 메뉴 합산)
      const allItems = useMemo(() => {
        return members.flatMap(m =>
          m.items
            .filter(it => it.name || it.amount > 0)
            .map(it => ({ ...it, memberName: m.name }))
        );
      }, [members]);

      // 인원별 정산 금액 계산
      const results = useMemo(() => {
        if (members.length === 0 || finalTotal <= 0) return [];
        if (splitMode === 'equal') {
          const perPerson = Math.ceil(finalTotal / members.length);
          return members.map((m, i) => ({
            name: m.name,
            amount: i === members.length - 1
              ? finalTotal - perPerson * (members.length - 1)
              : perPerson,
          }));
        } else {
          // 개별: 각자 주문 비율로 할인 적용
          return members.map(m => {
            const raw = getMemberRaw(m);
            if (grandTotal === 0) return { name: m.name, amount: 0 };
            return { name: m.name, amount: Math.round(raw / grandTotal * finalTotal) };
          });
        }
      }, [members, splitMode, finalTotal, grandTotal, getMemberRaw]);

      const copyResult = useCallback(() => {
        if (results.length === 0) return;
        const lines = [
          `[ 더치페이 정산 ]`,
          `총 메뉴 금액: ${formatNumber(grandTotal)}원`,
          discount > 0 ? `할인: -${formatNumber(discount)}원` : '',
          `최종 결제: ${formatNumber(finalTotal)}원`,
          `정산 방식: ${splitMode === 'equal' ? '1/N 균등' : '개별 정산'}`,
          ``,
        ].filter(s => s !== null && s !== undefined);
        results.forEach(r => {
          lines.push(`${r.name}: ${formatNumber(r.amount)}원`);
        });
        navigator.clipboard.writeText(lines.join('\n')).then(() => {
          setShowToast(true);
          setTimeout(() => setShowToast(false), 2000);
        });
      }, [results, grandTotal, discount, finalTotal, splitMode]);

      const resetAll = useCallback(() => {
        setMembers([]);
        setNewName('');
        setDiscountInput('');
        setSplitMode('individual');
      }, []);

      const hasData = members.length > 0;
      const canShowResult = hasData && finalTotal > 0;

      return (
        <div className="fade-in">
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">

            {/* ── 왼쪽: 1·2단계 ── */}
            <div className="space-y-6">

              {/* STEP 1: 참여 인원 */}
              <div>
                <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">1. 참여 인원</h3>
                <div className="flex gap-2 mb-3">
                  <input ref={nameInputRef} type="text" value={newName}
                    onChange={(e) => setNewName(e.target.value)}
                    onKeyDown={(e) => e.key === 'Enter' && addMember()}
                    placeholder="이름 입력 후 Enter 또는 추가 버튼"
                    className="flex-1 rounded-xl border-2 border-gray-200 px-4 py-2.5 text-gray-900 placeholder-gray-400
                      focus:border-brand-500 focus:ring-0 focus:outline-none transition-colors duration-200 text-sm" />
                  <Button variant="primary" onClick={addMember} disabled={!newName.trim()}>
                    <IconPlus /> 추가
                  </Button>
                </div>
                {members.length > 0 && (
                  <div className="flex flex-wrap gap-2">
                    {members.map(m => (
                      <div key={m.id} className="flex items-center gap-1.5 bg-brand-50 border border-brand-200 rounded-full px-3 py-1">
                        <div className="w-5 h-5 rounded-full bg-brand-500 text-white flex items-center justify-center text-xs font-bold">
                          {m.name.charAt(0)}
                        </div>
                        <span className="text-sm font-medium text-brand-700">{m.name}</span>
                        <button onClick={() => removeMember(m.id)}
                          className="text-brand-300 hover:text-red-500 transition-colors ml-0.5">
                          <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                          </svg>
                        </button>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* STEP 2: 메뉴 입력 */}
              {members.length > 0 && (
                <div className="fade-in">
                  <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">2. 인원별 메뉴 입력</h3>
                  <div className="space-y-3">
                    {members.map(member => (
                      <MemberCard
                        key={member.id}
                        member={member}
                        memberTotal={getMemberRaw(member)}
                        onAddItem={addItem}
                        onUpdateItem={updateItem}
                        onRemoveItem={removeItem}
                      />
                    ))}
                  </div>
                </div>
              )}

            </div>

            {/* ── 오른쪽: 3·4·5단계 ── */}
            <div className="space-y-6">

              {/* STEP 3: 결제 금액 확인 */}
              {hasData && grandTotal > 0 && (
                <div className="fade-in">
                  <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">3. 결제 금액 확인</h3>
                  <div className="bg-gray-50 rounded-2xl border border-gray-200 overflow-hidden">
                    {allItems.length > 0 && (
                      <div className="p-4 space-y-1.5">
                        {allItems.map(it => (
                          <div key={it.id} className="flex justify-between items-center text-sm">
                            <span className="text-gray-600">
                              <span className="text-gray-400 text-xs mr-1.5">{it.memberName}</span>
                              {it.name || '(이름 없음)'}
                            </span>
                            <span className="font-medium text-gray-800">{formatNumber(it.amount)}원</span>
                          </div>
                        ))}
                      </div>
                    )}
                    <div className="border-t border-gray-200 px-4 py-3 flex justify-between items-center">
                      <span className="text-sm text-gray-500">소계</span>
                      <span className="font-semibold text-gray-800">{formatNumber(grandTotal)}원</span>
                    </div>
                    <div className="border-t border-gray-200 px-4 py-3 flex items-center gap-3">
                      <span className="text-sm text-gray-500 flex-shrink-0">할인 금액</span>
                      <div className="flex-1 relative">
                        <input type="text" value={discountInput} onChange={handleDiscountChange}
                          placeholder="0"
                          className="w-full rounded-lg border border-gray-200 px-3 py-1.5 pr-8 text-sm text-right text-gray-900
                            focus:border-brand-400 focus:ring-0 focus:outline-none transition-colors" />
                        <span className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none">원</span>
                      </div>
                    </div>
                    <div className="border-t border-brand-100 bg-brand-50 px-4 py-4 flex justify-between items-center">
                      <span className="font-semibold text-brand-700">최종 결제 금액</span>
                      <span className="text-xl font-bold text-brand-700">{formatNumber(finalTotal)}원</span>
                    </div>
                  </div>
                </div>
              )}

              {/* STEP 4: 정산 방식 */}
              {hasData && grandTotal > 0 && (
                <div className="fade-in">
                  <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">4. 정산 방식 선택</h3>
                  <div className="grid grid-cols-2 gap-3">
                    {[
                      { value: 'individual', label: '개별 계산', desc: '각자 주문한 금액 기준' },
                      { value: 'equal', label: '1/N 균등', desc: `${members.length}명이 동일하게` },
                    ].map(opt => (
                      <button key={opt.value} onClick={() => setSplitMode(opt.value)}
                        className={`rounded-xl border-2 p-4 text-left transition-all duration-200
                          ${splitMode === opt.value
                            ? 'border-brand-500 bg-brand-50'
                            : 'border-gray-200 bg-white hover:border-gray-300'}`}>
                        <div className="flex items-center gap-2 mb-1">
                          <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center flex-shrink-0
                            ${splitMode === opt.value ? 'border-brand-500' : 'border-gray-300'}`}>
                            {splitMode === opt.value && (
                              <div className="w-2 h-2 rounded-full bg-brand-500" />
                            )}
                          </div>
                          <span className={`font-semibold text-sm ${splitMode === opt.value ? 'text-brand-700' : 'text-gray-700'}`}>
                            {opt.label}
                          </span>
                        </div>
                        <p className={`text-xs ml-6 ${splitMode === opt.value ? 'text-brand-500' : 'text-gray-400'}`}>
                          {opt.desc}
                        </p>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* STEP 5: 정산 결과 */}
              {canShowResult && (
                <div className="fade-in">
                  <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">5. 정산 결과</h3>
                  <div className="space-y-2">
                    {results.map(r => (
                      <div key={r.name}
                        className="flex items-center justify-between bg-white border-2 border-brand-100 rounded-xl px-4 py-3">
                        <div className="flex items-center gap-2">
                          <div className="w-8 h-8 rounded-full bg-brand-100 text-brand-600 flex items-center justify-center text-sm font-bold">
                            {r.name.charAt(0)}
                          </div>
                          <span className="font-medium text-gray-800">{r.name}</span>
                        </div>
                        <span className="text-lg font-bold text-brand-700">{formatNumber(r.amount)}원</span>
                      </div>
                    ))}
                  </div>
                  <div className="mt-4 flex flex-wrap gap-2">
                    <Button variant="secondary" size="sm" onClick={copyResult}>
                      <IconCopy /> 결과 복사
                    </Button>
                    <Button variant="ghost" size="sm" onClick={resetAll}>
                      <IconReset /> 초기화
                    </Button>
                  </div>
                </div>
              )}

            </div>
          </div>

          <Toast message="클립보드에 복사되었습니다!" show={showToast} />
        </div>
      );
    }

    // ========================================
    // 7. Member Card Component
    // ========================================

    function MemberCard({ member, memberTotal, onAddItem, onUpdateItem, onRemoveItem }) {
      return (
        <div className="bg-gray-50 rounded-xl border border-gray-200 p-4 fade-in">
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-2">
              <div className="w-7 h-7 rounded-full bg-brand-100 text-brand-600 flex items-center justify-center text-xs font-bold">
                {member.name.charAt(0)}
              </div>
              <span className="font-semibold text-gray-800 text-sm">{member.name}</span>
            </div>
            <Badge variant={memberTotal > 0 ? 'brand' : 'default'}>
              {formatNumber(memberTotal)}원
            </Badge>
          </div>

          <div className="space-y-2">
            {member.items.map(item => (
              <div key={item.id} className="flex gap-2 items-center fade-in">
                <input type="text" value={item.name}
                  onChange={(e) => onUpdateItem(member.id, item.id, 'name', e.target.value)}
                  placeholder="메뉴명"
                  className="flex-1 rounded-lg border border-gray-200 bg-white px-3 py-1.5 text-sm text-gray-900 placeholder-gray-400
                    focus:border-brand-400 focus:ring-0 focus:outline-none transition-colors" />
                <div className="relative w-28">
                  <input type="text" value={item.amountInput}
                    onChange={(e) => onUpdateItem(member.id, item.id, 'amount', e.target.value)}
                    placeholder="0"
                    className="w-full rounded-lg border border-gray-200 bg-white px-3 py-1.5 pr-7 text-sm text-gray-900 text-right placeholder-gray-400
                      focus:border-brand-400 focus:ring-0 focus:outline-none transition-colors" />
                  <span className="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none">원</span>
                </div>
                <button onClick={() => onRemoveItem(member.id, item.id)}
                  className="text-gray-300 hover:text-red-500 transition-colors p-1 flex-shrink-0">
                  <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </div>
            ))}
            <button onClick={() => onAddItem(member.id)}
              className="flex items-center gap-1.5 text-xs text-brand-500 hover:text-brand-700 transition-colors py-1 font-medium">
              <IconPlus /> 메뉴 추가
            </button>
          </div>
        </div>
      );
    }

    // ========================================
    // 8. App Component
    // ========================================

    function App() {
      const [activeTab, setActiveTab] = useState('equal');
      const [totalAmount, setTotalAmount] = useState(0);

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 via-white to-brand-50">
          {/* Header */}
          <div className="bg-gradient-to-r from-brand-600 to-indigo-600 text-white">
            <div className="max-w-lg mx-auto px-4 py-8 text-center">
              <div className="inline-flex items-center justify-center w-14 h-14 bg-white/20 backdrop-blur rounded-2xl mb-4">
                <svg className="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5}
                    d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z" />
                </svg>
              </div>
              <h1 className="text-2xl font-bold">더치페이 계산기</h1>
              <p className="text-brand-200 text-sm mt-1">간편하게 정산하세요</p>
            </div>
          </div>

          {/* Main Content */}
          <div className={`mx-auto px-4 -mt-4 pb-12 transition-all duration-300 ${activeTab === 'unequal' ? 'max-w-4xl' : 'max-w-lg'}`}>
            <Card className="mb-4">
              <TabSwitcher activeTab={activeTab} onTabChange={setActiveTab} />
            </Card>

            <Card>
              {activeTab === 'equal'
                ? <EqualSplit totalAmount={totalAmount} setTotalAmount={setTotalAmount} />
                : <UnequalSplit />
              }
            </Card>

            {/* Tips */}
            <div className="mt-6 text-center">
              <p className="text-xs text-gray-400">
                {activeTab === 'equal'
                  ? '* 1원 단위 올림 처리하여 마지막 사람이 조정합니다'
                  : '* 인원 추가 → 메뉴 입력 → 정산 방식 선택 순으로 진행하세요'}
              </p>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 9. Rendering
    // ========================================

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
