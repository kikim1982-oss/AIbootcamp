<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 생성기 - MS Word Style</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }

    .ribbon-bar {
      background: #2b579a;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 48px;
      gap: 4px;
    }
    .ribbon-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: none;
      background: transparent;
      color: white;
      font-size: 13px;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .ribbon-btn:hover { background: rgba(255,255,255,0.15); }
    .ribbon-btn.active { background: rgba(255,255,255,0.25); }
    .ribbon-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .ribbon-sep { width: 1px; height: 28px; background: rgba(255,255,255,0.25); margin: 0 6px; }

    .canvas-bg { background: #e8e8e8; }

    .doc-card {
      background: white;
      box-shadow: 0 1px 6px rgba(0,0,0,0.18);
      border: 1px solid #d0d0d0;
    }

    .preview-page {
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .mode-tab {
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #c0c0c0;
      background: #f0f0f0;
      color: #333;
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      margin-right: 2px;
    }
    .mode-tab.active {
      background: white;
      font-weight: 600;
      color: #2b579a;
    }

    .editor-area {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 20px;
      background: white;
    }

    .preview-content {
      padding: 40px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 12px;
      line-height: 1.7;
      color: #333;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .preview-content h1 { font-size: 22px; font-weight: 700; margin: 16px 0 10px; color: #1a1a1a; }
    .preview-content h2 { font-size: 18px; font-weight: 600; margin: 14px 0 8px; color: #222; }
    .preview-content h3 { font-size: 15px; font-weight: 600; margin: 12px 0 6px; color: #333; }
    .preview-content p { margin: 6px 0; }
    .preview-content ul, .preview-content ol { margin: 6px 0 6px 20px; }
    .preview-content li { margin: 3px 0; }
    .preview-content code { background: #f4f4f4; padding: 1px 5px; border-radius: 3px; font-size: 11px; }
    .preview-content pre { background: #f4f4f4; padding: 12px; border-radius: 4px; overflow-x: auto; margin: 8px 0; }
    .preview-content pre code { background: none; padding: 0; }
    .preview-content blockquote { border-left: 3px solid #2b579a; padding-left: 12px; margin: 8px 0; color: #555; }
    .preview-content table { border-collapse: collapse; margin: 8px 0; width: 100%; }
    .preview-content th, .preview-content td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; font-size: 11px; }
    .preview-content th { background: #f0f0f0; font-weight: 600; }
    .preview-content a { color: #2b579a; text-decoration: underline; }
    .preview-content hr { border: none; border-top: 1px solid #ccc; margin: 12px 0; }
    .preview-content img { max-width: 100%; }

    .drop-zone {
      border: 2px dashed #aaa;
      border-radius: 8px;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone.drag-over {
      border-color: #2b579a;
      background: rgba(43,87,154,0.06);
    }

    .title-input {
      border: none;
      outline: none;
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
      width: 100%;
      padding: 16px 20px 8px;
      background: white;
      border-bottom: 1px solid #e8e8e8;
    }
    .title-input::placeholder { color: #bbb; }

    .size-input {
      width: 70px;
      border: 1px solid #c0c0c0;
      border-radius: 3px;
      padding: 4px 6px;
      font-size: 12px;
      outline: none;
      text-align: center;
    }
    .size-input:focus { border-color: #2b579a; }

    .status-bar {
      background: #2b579a;
      color: rgba(255,255,255,0.8);
      font-size: 11px;
      padding: 3px 16px;
      display: flex;
      justify-content: space-between;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useRef, useCallback, useEffect, useMemo } = React;

    // ========================================
    // SVG Icon Components
    // ========================================
    const Icons = {
      File: () => (
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
          <path d="M4 1h5l4 4v9a1 1 0 01-1 1H4a1 1 0 01-1-1V2a1 1 0 011-1z"/>
          <path d="M9 1v4h4"/>
        </svg>
      ),
      Download: () => (
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
          <path d="M8 2v9m0 0l-3-3m3 3l3-3M3 13h10"/>
        </svg>
      ),
      FileText: () => (
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
          <path d="M4 1h5l4 4v9a1 1 0 01-1 1H4a1 1 0 01-1-1V2a1 1 0 011-1z"/>
          <path d="M9 1v4h4M6 8h4M6 10.5h4"/>
        </svg>
      ),
      Settings: () => (
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
          <circle cx="8" cy="8" r="2.5"/>
          <path d="M13.5 8a5.5 5.5 0 01-.3 1.2l1.2 1-1.2 2-1.5-.5a5.5 5.5 0 01-1 .6L10.2 14H7.8l-.5-1.7a5.5 5.5 0 01-1-.6l-1.5.5-1.2-2 1.2-1A5.5 5.5 0 014.5 8c0-.4 0-.8.1-1.2l-1.2-1 1.2-2 1.5.5a5.5 5.5 0 011-.6L7.8 2h2.4l.5 1.7a5.5 5.5 0 011 .6l1.5-.5 1.2 2-1.2 1c.1.4.2.8.2 1.2z"/>
        </svg>
      ),
    };

    // ========================================
    // Design System Components
    // ========================================
    function Modal({ isOpen, onClose, title, children }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center" onClick={onClose}>
          <div className="absolute inset-0 bg-black bg-opacity-40"/>
          <div
            className="relative bg-white rounded-lg shadow-xl max-w-md w-full mx-4"
            onClick={e => e.stopPropagation()}
          >
            <div className="flex items-center justify-between px-5 py-3 border-b border-gray-200">
              <h3 className="font-semibold text-sm text-gray-800">{title}</h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-lg leading-none">&times;</button>
            </div>
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    }

    // ========================================
    // Page Size Presets
    // ========================================
    const PAGE_SIZES = {
      A4: { w: 210, h: 297, label: 'A4 (210 x 297 mm)' },
      A3: { w: 297, h: 420, label: 'A3 (297 x 420 mm)' },
      Letter: { w: 216, h: 279, label: 'Letter (216 x 279 mm)' },
      Custom: { w: 210, h: 297, label: '사용자 지정' },
    };

    // ========================================
    // App Component
    // ========================================
    function App() {
      const [title, setTitle] = useState('');
      const [content, setContent] = useState('# 제목을 입력하세요\n\n본문 내용을 여기에 작성합니다.\n\n## 소제목\n\n- 항목 1\n- 항목 2\n- 항목 3\n\n> 인용문도 지원합니다.\n\n```\n코드 블록 예시\n```');
      const [mode, setMode] = useState('markdown'); // markdown, html, plaintext
      const [sizePreset, setSizePreset] = useState('A4');
      const [customW, setCustomW] = useState(210);
      const [customH, setCustomH] = useState(297);
      const [isGenerating, setIsGenerating] = useState(false);
      const [showSizeModal, setShowSizeModal] = useState(false);
      const [dragOver, setDragOver] = useState(false);

      const previewRef = useRef(null);
      const fileInputRef = useRef(null);

      const pageSize = useMemo(() => {
        if (sizePreset === 'Custom') return { w: Number(customW) || 210, h: Number(customH) || 297 };
        return PAGE_SIZES[sizePreset];
      }, [sizePreset, customW, customH]);

      // Rendered HTML from content
      const renderedHTML = useMemo(() => {
        if (mode === 'html') return content;
        if (mode === 'markdown') {
          try { return marked.parse(content || ''); }
          catch { return '<p>Markdown 파싱 오류</p>'; }
        }
        // plaintext
        const escaped = (content || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\n/g, '<br/>');
        return `<p>${escaped}</p>`;
      }, [content, mode]);

      // Preview aspect ratio sizing
      const previewStyle = useMemo(() => {
        const ratio = pageSize.h / pageSize.w;
        return { aspectRatio: `${pageSize.w} / ${pageSize.h}` };
      }, [pageSize]);

      // File loading
      const handleFileLoad = useCallback((file) => {
        if (!file) return;
        const ext = file.name.split('.').pop().toLowerCase();
        const reader = new FileReader();
        reader.onload = (e) => {
          const text = e.target.result;
          setContent(text);
          if (ext === 'md') setMode('markdown');
          else if (ext === 'html' || ext === 'htm') setMode('html');
          else setMode('plaintext');
          // Set title from filename
          const nameWithoutExt = file.name.replace(/\.[^.]+$/, '');
          if (!title) setTitle(nameWithoutExt);
        };
        reader.readAsText(file);
      }, [title]);

      const handleDrop = useCallback((e) => {
        e.preventDefault();
        setDragOver(false);
        const file = e.dataTransfer.files[0];
        if (file) handleFileLoad(file);
      }, [handleFileLoad]);

      const handleDragOver = useCallback((e) => {
        e.preventDefault();
        setDragOver(true);
      }, []);

      const handleDragLeave = useCallback(() => {
        setDragOver(false);
      }, []);

      // PDF Generation
      const generatePDF = useCallback(async () => {
        if (!previewRef.current) return;
        setIsGenerating(true);
        try {
          const captureEl = previewRef.current;
          const canvas = await html2canvas(captureEl, {
            scale: 2,
            useCORS: true,
            backgroundColor: '#ffffff',
            logging: false,
          });

          const { jsPDF } = window.jspdf;
          const orientation = pageSize.w > pageSize.h ? 'l' : 'p';
          const pdf = new jsPDF({
            orientation,
            unit: 'mm',
            format: [pageSize.w, pageSize.h],
          });

          const imgData = canvas.toDataURL('image/png');
          const pdfW = pageSize.w;
          const pdfH = pageSize.h;

          // Calculate image dimensions to fill page
          const canvasRatio = canvas.height / canvas.width;
          const pageRatio = pdfH / pdfW;

          let imgW, imgH;
          if (canvasRatio > pageRatio) {
            // Content taller than page: fit to width, may overflow
            imgW = pdfW;
            imgH = pdfW * canvasRatio;
          } else {
            imgW = pdfW;
            imgH = pdfW * canvasRatio;
          }

          // If content overflows, we handle multi-page
          const totalPages = Math.ceil(imgH / pdfH);
          for (let i = 0; i < totalPages; i++) {
            if (i > 0) pdf.addPage([pageSize.w, pageSize.h], orientation);
            pdf.addImage(imgData, 'PNG', 0, -(i * pdfH), imgW, imgH);
          }

          const fileName = (title || '문서').replace(/[^a-zA-Z0-9가-힣_\- ]/g, '') + '.pdf';
          pdf.save(fileName);
        } catch (err) {
          console.error('PDF 생성 오류:', err);
          alert('PDF 생성 중 오류가 발생했습니다: ' + err.message);
        } finally {
          setIsGenerating(false);
        }
      }, [pageSize, title]);

      const charCount = content.length;
      const lineCount = content.split('\n').length;
      const modeLabel = mode === 'markdown' ? 'Markdown' : mode === 'html' ? 'HTML' : '일반 텍스트';

      return (
        <div className="h-screen flex flex-col">
          {/* Title Bar */}
          <div className="flex items-center h-8 px-4 bg-[#1e3f73] text-white text-xs">
            <Icons.FileText />
            <span className="ml-2 font-medium">{title || '제목 없는 문서'} - PDF 생성기</span>
          </div>

          {/* Ribbon Bar */}
          <div className="ribbon-bar">
            <button className="ribbon-btn" onClick={() => fileInputRef.current?.click()}>
              <Icons.File /> 파일 열기
            </button>
            <input
              ref={fileInputRef}
              type="file"
              accept=".html,.htm,.md,.txt,.text"
              className="hidden"
              onChange={e => handleFileLoad(e.target.files[0])}
            />

            <div className="ribbon-sep" />

            {['markdown', 'html', 'plaintext'].map(m => (
              <button
                key={m}
                className={`ribbon-btn ${mode === m ? 'active' : ''}`}
                onClick={() => setMode(m)}
              >
                {m === 'markdown' ? 'Markdown' : m === 'html' ? 'HTML' : '텍스트'}
              </button>
            ))}

            <div className="ribbon-sep" />

            <button className="ribbon-btn" onClick={() => setShowSizeModal(true)}>
              <Icons.Settings /> {PAGE_SIZES[sizePreset]?.label || `${customW} x ${customH} mm`}
            </button>

            <div className="ribbon-sep" />

            <button
              className="ribbon-btn"
              style={{ background: isGenerating ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.12)' }}
              onClick={generatePDF}
              disabled={isGenerating}
            >
              {isGenerating ? <span className="spinner" /> : <Icons.Download />}
              {isGenerating ? 'PDF 생성 중...' : 'PDF 다운로드'}
            </button>
          </div>

          {/* Main Content */}
          <div className="flex-1 flex canvas-bg overflow-hidden">
            {/* Left: Editor */}
            <div
              className={`flex-1 flex flex-col m-3 mr-1.5 doc-card rounded overflow-hidden ${dragOver ? 'drop-zone drag-over' : ''}`}
              onDrop={handleDrop}
              onDragOver={handleDragOver}
              onDragLeave={handleDragLeave}
            >
              {/* Mode Tabs */}
              <div className="flex px-3 pt-2 bg-gray-50 border-b border-gray-200">
                {[
                  { id: 'markdown', label: 'Markdown' },
                  { id: 'html', label: 'HTML' },
                  { id: 'plaintext', label: '일반 텍스트' },
                ].map(tab => (
                  <button
                    key={tab.id}
                    className={`mode-tab ${mode === tab.id ? 'active' : ''}`}
                    onClick={() => setMode(tab.id)}
                  >
                    {tab.label}
                  </button>
                ))}
                <div className="flex-1" />
                <span className="text-xs text-gray-400 self-center mr-1">
                  파일 드래그앤드롭으로 불러오기
                </span>
              </div>

              {/* Title */}
              <input
                className="title-input"
                placeholder="문서 제목을 입력하세요"
                value={title}
                onChange={e => setTitle(e.target.value)}
              />

              {/* Editor */}
              <div className="flex-1 overflow-hidden">
                <textarea
                  className="editor-area"
                  value={content}
                  onChange={e => setContent(e.target.value)}
                  placeholder={
                    mode === 'markdown'
                      ? '# Markdown 문법으로 작성하세요...'
                      : mode === 'html'
                      ? '<h1>HTML을 직접 입력하세요</h1>'
                      : '일반 텍스트를 입력하세요...'
                  }
                  spellCheck={false}
                />
              </div>
            </div>

            {/* Right: Preview */}
            <div className="flex-1 flex flex-col m-3 ml-1.5 overflow-hidden">
              <div className="flex items-center justify-between px-3 py-2 bg-gray-100 rounded-t border border-gray-300 border-b-0">
                <span className="text-xs font-semibold text-gray-600">미리보기</span>
                <span className="text-xs text-gray-400">
                  {pageSize.w} x {pageSize.h} mm
                </span>
              </div>
              <div className="flex-1 overflow-auto bg-gray-400 border border-gray-300 border-t-0 rounded-b flex justify-center p-6">
                <div
                  ref={previewRef}
                  className="preview-page flex-shrink-0"
                  style={{
                    width: '100%',
                    maxWidth: '680px',
                    ...previewStyle,
                  }}
                >
                  {/* Title in preview */}
                  {title && (
                    <div style={{ padding: '40px 40px 0', fontSize: '22px', fontWeight: 700, color: '#1a1a1a', borderBottom: '2px solid #2b579a', paddingBottom: '12px', marginBottom: '0' }}>
                      {title}
                    </div>
                  )}
                  {/* Content in preview */}
                  <div
                    className="preview-content"
                    dangerouslySetInnerHTML={{ __html: renderedHTML }}
                  />
                </div>
              </div>
            </div>
          </div>

          {/* Status Bar */}
          <div className="status-bar">
            <span>모드: {modeLabel}</span>
            <span>{lineCount}줄 | {charCount}자</span>
          </div>

          {/* Size Setting Modal */}
          <Modal isOpen={showSizeModal} onClose={() => setShowSizeModal(false)} title="페이지 크기 설정">
            <div className="space-y-3">
              {Object.entries(PAGE_SIZES).map(([key, val]) => (
                <label
                  key={key}
                  className={`flex items-center gap-3 p-2.5 rounded cursor-pointer border ${sizePreset === key ? 'border-[#2b579a] bg-blue-50' : 'border-gray-200 hover:bg-gray-50'}`}
                >
                  <input
                    type="radio"
                    name="pageSize"
                    checked={sizePreset === key}
                    onChange={() => setSizePreset(key)}
                    className="accent-[#2b579a]"
                  />
                  <span className="text-sm">{val.label}</span>
                </label>
              ))}

              {sizePreset === 'Custom' && (
                <div className="flex items-center gap-3 pl-8 pt-1">
                  <label className="text-xs text-gray-500">가로</label>
                  <input
                    type="number"
                    className="size-input"
                    value={customW}
                    onChange={e => setCustomW(e.target.value)}
                    min="50"
                    max="1000"
                  />
                  <span className="text-xs text-gray-400">mm</span>
                  <label className="text-xs text-gray-500 ml-2">세로</label>
                  <input
                    type="number"
                    className="size-input"
                    value={customH}
                    onChange={e => setCustomH(e.target.value)}
                    min="50"
                    max="1000"
                  />
                  <span className="text-xs text-gray-400">mm</span>
                </div>
              )}

              <div className="flex justify-end pt-3 border-t border-gray-100">
                <button
                  className="px-5 py-1.5 text-sm rounded text-white"
                  style={{ background: '#2b579a' }}
                  onClick={() => setShowSizeModal(false)}
                >
                  확인
                </button>
              </div>
            </div>
          </Modal>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
