<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY DIARY</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      box-sizing: border-box;
    }
    body { margin: 0; padding: 0; height: 100vh; overflow: hidden; }
    #root { height: 100vh; }

    .font-playfair { font-family: 'Playfair Display', Georgia, serif; }

    .memo-item:hover .delete-btn { opacity: 1; }
    .delete-btn { opacity: 0; transition: opacity 0.15s; }

    textarea:focus, input:focus { outline: none; }

    /* Custom scrollbar - dark theme for sidebar */
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #C9A84C55; border-radius: 3px; }
    .custom-scroll::-webkit-scrollbar-thumb:hover { background: #C9A84C88; }

    .custom-scroll-dark::-webkit-scrollbar { width: 6px; }
    .custom-scroll-dark::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll-dark::-webkit-scrollbar-thumb { background: #2D5016; border-radius: 3px; }
    .custom-scroll-dark::-webkit-scrollbar-thumb:hover { background: #3a6a1e; }

    .line-clamp-1 {
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* contenteditable editor styles */
    .editor-content:focus { outline: none; }
    .editor-content:empty::before {
      content: attr(data-placeholder);
      color: #C9A84C88;
      pointer-events: none;
      font-style: italic;
    }
    .editor-content h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0.25em 0;
      color: #1E3932;
    }
    .editor-content h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0.25em 0;
      color: #2D5016;
    }

    /* Notebook lined background */
    .notebook-lines {
      background-image: repeating-linear-gradient(
        transparent, transparent 31px, #E8DFD0 31px, #E8DFD0 32px
      );
      line-height: 32px;
    }

    /* Color palette popup */
    .color-palette {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 6px;
      background: #FAFAFA;
      border: 1px solid #E8DFD0;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(30,57,50,0.18);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      z-index: 50;
      min-width: 200px;
    }
    .color-swatch {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 2px solid #E8DFD0;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .color-swatch:hover {
      transform: scale(1.1);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .color-swatch.selected {
      border-color: #C9A84C;
      box-shadow: 0 0 0 3px #C9A84C88;
    }

    /* Gold underline */
    .gold-underline {
      position: relative;
      display: inline-block;
    }
    .gold-underline::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 100%;
      height: 2px;
      background: #C9A84C;
    }

    /* Toolbar button */
    .toolbar-btn {
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 6px;
      transition: all 0.15s;
      color: #1E3932;
    }
    .toolbar-btn:hover {
      background: #E8DFD0;
    }

    /* Divider in toolbar */
    .toolbar-divider {
      width: 1px;
      height: 20px;
      background: #E8DFD0;
      margin: 0 4px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ========================================
    // API Configuration
    // ========================================
    const API_BASE_URL = '/api';

    async function apiCall(endpoint, options = {}) {
      const res = await fetch(`${API_BASE_URL}${endpoint}`, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      return res.json();
    }

    // ========================================
    // Constants: Color Palette
    // ========================================
    const MEMO_COLORS = ['#FAFAFA', '#F5F0E8', '#FEF9C3', '#FCE7F3', '#E0F2FE', '#DCFCE7', '#EDE9FE', '#FEE2E2'];

    function getMemoColor(id) {
      try {
        return localStorage.getItem(`memo_color_${id}`) || '#FAFAFA';
      } catch {
        return '#FAFAFA';
      }
    }

    function setMemoColor(id, color) {
      try {
        localStorage.setItem(`memo_color_${id}`, color);
      } catch {}
    }

    // ========================================
    // Utility: Date Formatting
    // ========================================
    function formatDateTag(dateStr) {
      const d = new Date(dateStr);
      const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      return `${months[d.getMonth()]} ${d.getDate()}`;
    }

    function formatDateFull(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('ko-KR', {
        year: 'numeric', month: 'long', day: 'numeric',
        weekday: 'long'
      });
    }

    function formatDateGold(dateStr) {
      const d = new Date(dateStr);
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
    }

    // ========================================
    // Utility: useDebounce Hook
    // ========================================
    function useDebounce(callback, delay) {
      const timerRef = useRef(null);

      const debouncedFn = useCallback((...args) => {
        if (timerRef.current) clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => {
          callback(...args);
        }, delay);
      }, [callback, delay]);

      useEffect(() => {
        return () => {
          if (timerRef.current) clearTimeout(timerRef.current);
        };
      }, []);

      return debouncedFn;
    }

    // ========================================
    // Component: Sidebar
    // ========================================
    function Sidebar({ memoCount, onNewMemo, isMobile }) {
      return (
        <div
          className="flex flex-col h-full"
          style={{
            width: isMobile ? '100%' : 240,
            minWidth: isMobile ? '100%' : 240,
            backgroundColor: '#1E3932',
          }}
        >
          {/* Logo area */}
          <div className="px-6 pt-8 pb-6">
            <div className="flex items-center gap-3">
              <span className="text-2xl">&#9749;</span>
              <span className="font-playfair text-xl font-bold text-white tracking-wider">MY DIARY</span>
            </div>
            <div className="mt-2 w-12 h-0.5" style={{ background: '#C9A84C' }}></div>
          </div>

          {/* Menu */}
          <div className="px-4 flex-1">
            <div
              className="flex items-center gap-3 px-4 py-3 rounded-lg cursor-default transition-colors"
              style={{ backgroundColor: '#2D5016' }}
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
              </svg>
              <span className="text-sm font-semibold text-white flex-1 tracking-wide">ALL NOTES</span>
              <span
                className="text-xs font-bold px-2.5 py-0.5 rounded-full"
                style={{ backgroundColor: '#C9A84C', color: '#1E3932' }}
              >
                {memoCount}
              </span>
            </div>
          </div>

          {/* New Note Button */}
          <div className="px-4 pb-6">
            <button
              onClick={onNewMemo}
              className="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-lg font-semibold text-sm transition-all hover:opacity-90 active:scale-[0.98]"
              style={{ backgroundColor: '#C9A84C', color: '#1E3932' }}
              aria-label="새 노트"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              NEW NOTE
            </button>
          </div>
        </div>
      );
    }

    // ========================================
    // Component: MemoListItem
    // ========================================
    function MemoListItem({ memo, isSelected, onSelect, onDelete }) {
      return (
        <div
          className="memo-item relative cursor-pointer transition-colors"
          style={{
            backgroundColor: isSelected ? '#EDE5D4' : 'transparent',
          }}
          onClick={() => onSelect(memo.id)}
        >
          {/* Gold selection bar */}
          {isSelected && (
            <div
              className="absolute right-0 top-2 bottom-2 rounded-l"
              style={{ width: 3, backgroundColor: '#C9A84C' }}
            />
          )}

          <div className="px-5 py-4">
            {/* Date tag */}
            <div className="mb-1.5">
              <span
                className="text-[10px] font-bold tracking-widest px-2 py-0.5 rounded"
                style={{ backgroundColor: '#C9A84C22', color: '#C9A84C' }}
              >
                {formatDateTag(memo.createdAt)}
              </span>
            </div>

            {/* Title */}
            <div className="flex items-start justify-between gap-2">
              <div className="flex-1 min-w-0">
                <div className="text-sm font-bold truncate" style={{ color: '#1E3932' }}>
                  {memo.title || '새로운 노트'}
                </div>
                <div className="text-xs mt-0.5 line-clamp-1" style={{ color: '#8B7E6A' }}>
                  {memo.content ? memo.content.replace(/<[^>]*>/g, '') || '내용 없음' : '내용 없음'}
                </div>
              </div>
              <button
                className="delete-btn w-6 h-6 flex items-center justify-center rounded hover:bg-red-100 transition-colors mt-0.5 flex-shrink-0"
                style={{ color: '#8B7E6A' }}
                onClick={(e) => { e.stopPropagation(); onDelete(memo.id); }}
                aria-label="노트 삭제"
                title="삭제"
              >
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                  <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                </svg>
              </button>
            </div>
          </div>

          {/* Bottom border */}
          <div className="mx-5" style={{ height: 1, backgroundColor: '#E8DFD0' }}></div>
        </div>
      );
    }

    // ========================================
    // Component: MemoList
    // ========================================
    function MemoList({ memos, selectedId, onSelect, onDelete, isMobile, onBack }) {
      return (
        <div
          className="flex flex-col h-full"
          style={{
            width: isMobile ? '100%' : 280,
            minWidth: isMobile ? '100%' : 280,
            backgroundColor: '#F5F0E8',
            borderRight: isMobile ? 'none' : '1px solid #E8DFD0',
          }}
        >
          {/* Header */}
          <div className="px-5 pt-6 pb-4">
            {isMobile && (
              <button
                onClick={onBack}
                className="text-sm font-medium flex items-center gap-1 mb-3"
                style={{ color: '#1E3932' }}
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M15 18l-6-6 6-6"/>
                </svg>
                Back
              </button>
            )}
            <h2 className="font-playfair text-lg font-bold tracking-wide gold-underline" style={{ color: '#1E3932' }}>
              WEEKLY NOTES
            </h2>
          </div>

          {/* List */}
          <div className="flex-1 overflow-y-auto custom-scroll">
            {memos.length === 0 ? (
              <div className="flex flex-col items-center justify-center h-full px-6" style={{ color: '#8B7E6A' }}>
                <span className="text-4xl mb-3">&#9749;</span>
                <p className="text-sm text-center">노트가 없습니다.<br/>새 노트를 작성해 보세요.</p>
              </div>
            ) : (
              memos.map((memo) => (
                <MemoListItem
                  key={memo.id}
                  memo={memo}
                  isSelected={selectedId === memo.id}
                  onSelect={onSelect}
                  onDelete={onDelete}
                />
              ))
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // Component: ColorPalette
    // ========================================
    function ColorPalette({ memoId, onColorChange, onClose }) {
      const currentColor = getMemoColor(memoId);
      const paletteRef = useRef(null);

      useEffect(() => {
        function handleClickOutside(e) {
          if (paletteRef.current && !paletteRef.current.contains(e.target)) {
            onClose();
          }
        }
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, [onClose]);

      return (
        <div ref={paletteRef} className="color-palette">
          {MEMO_COLORS.map((color) => (
            <button
              key={color}
              className={`color-swatch ${currentColor === color ? 'selected' : ''}`}
              style={{ backgroundColor: color }}
              onClick={() => {
                setMemoColor(memoId, color);
                onColorChange(color);
                onClose();
              }}
              aria-label={`배경색 ${color}`}
            />
          ))}
        </div>
      );
    }

    // ========================================
    // Component: TextColorPicker
    // ========================================
    const TEXT_COLORS = [
      '#000000', '#1E3932', '#3D3D3D', '#C9A84C',
      '#DC2626', '#EA580C', '#16A34A', '#2563EB',
      '#9333EA', '#DB2777', '#6B7280', '#FFFFFF',
    ];

    function TextColorPicker({ onSelect, onClose }) {
      const ref = useRef(null);

      useEffect(() => {
        function handleClickOutside(e) {
          if (ref.current && !ref.current.contains(e.target)) onClose();
        }
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, [onClose]);

      return (
        <div ref={ref} style={{
          position: 'absolute', top: '100%', left: 0, marginTop: 6,
          background: '#FAFAFA', border: '1px solid #E8DFD0', borderRadius: 12,
          padding: 10, boxShadow: '0 8px 24px rgba(30,57,50,0.18)',
          display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8, zIndex: 50,
        }}>
          {TEXT_COLORS.map(color => (
            <button
              key={color}
              onMouseDown={(e) => { e.preventDefault(); onSelect(color); }}
              style={{
                width: 28, height: 28, borderRadius: 6,
                backgroundColor: color,
                border: color === '#FFFFFF' ? '2px solid #E8DFD0' : '2px solid transparent',
                cursor: 'pointer', transition: 'transform 0.1s',
              }}
              title={color}
            />
          ))}
        </div>
      );
    }

    // ========================================
    // Component: EditorToolbar
    // ========================================
    const FONTS = [
      { label: '기본', value: '-apple-system, BlinkMacSystemFont, sans-serif' },
      { label: '고딕', value: "'Segoe UI', Arial, sans-serif" },
      { label: '명조', value: "'Playfair Display', Georgia, serif" },
      { label: '타자기', value: "'Courier New', monospace" },
    ];

    const SIZES = [
      { label: '작게', value: '1' },
      { label: '보통', value: '3' },
      { label: '중간', value: '4' },
      { label: '크게', value: '5' },
      { label: '매우 크게', value: '6' },
    ];

    function EditorToolbar({ memoId, onColorChange }) {
      const [showPalette, setShowPalette] = useState(false);
      const [showTextColor, setShowTextColor] = useState(false);
      const [textColor, setTextColor] = useState('#000000');

      const execCmd = (command, value) => {
        document.execCommand(command, false, value);
      };

      return (
        <div className="flex items-center flex-wrap gap-1 px-6 py-2" style={{ borderBottom: '1px solid #E8DFD0', minHeight: 40 }}>

          {/* Font family */}
          <select
            onChange={(e) => { execCmd('fontName', e.target.value); e.target.value = ''; }}
            defaultValue=""
            className="text-xs rounded px-1.5 py-1 cursor-pointer"
            style={{ border: '1px solid #E8DFD0', color: '#1E3932', background: 'transparent', outline: 'none' }}
          >
            <option value="" disabled>폰트</option>
            {FONTS.map(f => <option key={f.label} value={f.value}>{f.label}</option>)}
          </select>

          {/* Font size */}
          <select
            onChange={(e) => { execCmd('fontSize', e.target.value); e.target.value = ''; }}
            defaultValue=""
            className="text-xs rounded px-1.5 py-1 cursor-pointer"
            style={{ border: '1px solid #E8DFD0', color: '#1E3932', background: 'transparent', outline: 'none' }}
          >
            <option value="" disabled>크기</option>
            {SIZES.map(s => <option key={s.label} value={s.value}>{s.label}</option>)}
          </select>

          <div className="toolbar-divider" />

          {/* Bold */}
          <button
            onMouseDown={(e) => { e.preventDefault(); execCmd('bold'); }}
            className="toolbar-btn" style={{ fontWeight: 900 }} title="굵게"
          >B</button>

          {/* Italic */}
          <button
            onMouseDown={(e) => { e.preventDefault(); execCmd('italic'); }}
            className="toolbar-btn" style={{ fontStyle: 'italic' }} title="기울임"
          >I</button>

          {/* Underline */}
          <button
            onMouseDown={(e) => { e.preventDefault(); execCmd('underline'); }}
            className="toolbar-btn" style={{ textDecoration: 'underline' }} title="밑줄"
          >U</button>

          {/* Strikethrough */}
          <button
            onMouseDown={(e) => { e.preventDefault(); execCmd('strikeThrough'); }}
            className="toolbar-btn" style={{ textDecoration: 'line-through' }} title="취소선"
          >S</button>

          <div className="toolbar-divider" />

          {/* Text color */}
          <div className="relative">
            <button
              className="toolbar-btn flex items-center gap-1"
              title="글자 색상"
              onClick={() => setShowTextColor(p => !p)}
            >
              <span style={{ fontWeight: 700 }}>A</span>
              <div style={{ width: 14, height: 3, backgroundColor: textColor, borderRadius: 2 }} />
            </button>
            {showTextColor && (
              <TextColorPicker
                onSelect={(color) => {
                  setTextColor(color);
                  execCmd('foreColor', color);
                  setShowTextColor(false);
                }}
                onClose={() => setShowTextColor(false)}
              />
            )}
          </div>

          <div className="toolbar-divider" />

          {/* H1 */}
          <button
            onMouseDown={(e) => { e.preventDefault(); execCmd('formatBlock', 'h1'); }}
            className="toolbar-btn font-playfair" title="제목 1"
          >H1</button>

          {/* H2 */}
          <button
            onMouseDown={(e) => { e.preventDefault(); execCmd('formatBlock', 'h2'); }}
            className="toolbar-btn font-playfair" title="제목 2"
          >H2</button>

          <div className="flex-1" />

          {/* Background color palette */}
          <div className="relative">
            <button
              onClick={() => setShowPalette(p => !p)}
              className="toolbar-btn text-base" title="배경색 변경"
            >🎨</button>
            {showPalette && (
              <ColorPalette
                memoId={memoId}
                onColorChange={onColorChange}
                onClose={() => setShowPalette(false)}
              />
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // Component: Editor
    // ========================================
    function Editor({ memo, onUpdate, isMobile, onBack, editorRef }) {
      const [title, setTitle] = useState('');
      const [content, setContent] = useState('');
      const [bgColor, setBgColor] = useState('#FAFAFA');
      const titleRef = useRef(null);
      const contentRef = useRef(null);
      const isInitialMount = useRef(true);
      const internalContentRef = useRef('');

      useEffect(() => {
        if (memo) {
          setBgColor(getMemoColor(memo.id));
        }
      }, [memo?.id]);

      useEffect(() => {
        if (memo) {
          setTitle(memo.title || '');
          setContent(memo.content || '');
          internalContentRef.current = memo.content || '';
          isInitialMount.current = true;

          if (contentRef.current) {
            contentRef.current.innerHTML = memo.content || '';
          }
        }
      }, [memo?.id]);

      useEffect(() => {
        if (editorRef) {
          editorRef.current = {
            focusTitle: () => {
              if (titleRef.current) titleRef.current.focus();
            }
          };
        }
      }, [editorRef]);

      const saveCallback = useCallback((id, t, c) => {
        onUpdate(id, t, c);
      }, [onUpdate]);

      const debouncedSave = useDebounce(saveCallback, 1000);

      useEffect(() => {
        if (isInitialMount.current) {
          isInitialMount.current = false;
          return;
        }
        if (memo) {
          debouncedSave(memo.id, title, content);
        }
      }, [title, content]);

      useEffect(() => {
        if (memo && !memo.title && !memo.content) {
          setTimeout(() => {
            if (titleRef.current) titleRef.current.focus();
          }, 50);
        }
      }, [memo?.id]);

      const handleContentInput = useCallback(() => {
        if (contentRef.current) {
          const html = contentRef.current.innerHTML;
          internalContentRef.current = html;
          setContent(html);
        }
      }, []);

      const handleColorChange = useCallback((color) => {
        setBgColor(color);
      }, []);

      if (!memo) {
        return (
          <div className="flex-1 flex flex-col items-center justify-center h-full" style={{ backgroundColor: '#F5F0E8' }}>
            <span className="text-6xl mb-4" style={{ opacity: 0.3 }}>&#9749;</span>
            <p className="font-playfair text-lg" style={{ color: '#C9A84C88' }}>Select a note to begin</p>
          </div>
        );
      }

      return (
        <div className="flex-1 flex flex-col h-full" style={{ backgroundColor: bgColor }}>
          {/* Mobile back */}
          {isMobile && (
            <div className="flex items-center gap-2 px-4 py-3" style={{ borderBottom: '1px solid #E8DFD0' }}>
              <button
                onClick={onBack}
                className="text-sm font-medium flex items-center gap-1"
                style={{ color: '#1E3932' }}
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M15 18l-6-6 6-6"/>
                </svg>
                Notes
              </button>
              <span className="flex-1"></span>
            </div>
          )}

          {/* Date header */}
          <div className="px-8 py-4" style={{ borderBottom: '1px solid #E8DFD0' }}>
            <p className="font-playfair text-sm font-semibold tracking-wide" style={{ color: '#C9A84C' }}>
              {formatDateGold(memo.createdAt)}
            </p>
          </div>

          {/* Toolbar */}
          <EditorToolbar memoId={memo.id} onColorChange={handleColorChange} />

          {/* Title + Content */}
          <div className="flex-1 flex flex-col overflow-hidden px-8 py-6">
            <input
              ref={titleRef}
              type="text"
              value={title}
              onChange={(e) => setTitle(e.target.value)}
              placeholder="Untitled Note"
              className="font-playfair font-bold placeholder-opacity-30 mb-4 w-full border-none bg-transparent"
              style={{
                fontSize: '2rem',
                color: '#1E3932',
                caretColor: '#C9A84C',
                outline: 'none',
                lineHeight: 1.3,
              }}
            />
            <div className="w-16 mb-4" style={{ height: 2, backgroundColor: '#C9A84C44' }}></div>
            <div
              ref={contentRef}
              contentEditable
              className="editor-content notebook-lines flex-1 text-base w-full overflow-y-auto custom-scroll"
              style={{
                color: '#3D3D3D',
                caretColor: '#C9A84C',
                minHeight: 0,
                paddingTop: 0,
              }}
              data-placeholder="Start writing your thoughts..."
              onInput={handleContentInput}
              suppressContentEditableWarning={true}
            />
          </div>
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      const [memos, setMemos] = useState([]);
      const [selectedId, setSelectedId] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const editorRef = useRef(null);

      const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);
      const [mobileView, setMobileView] = useState('list');

      useEffect(() => {
        const handleResize = () => setIsMobile(window.innerWidth <= 768);
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      const fetchMemos = useCallback(async () => {
        try {
          setLoading(true);
          const res = await apiCall('/memos');
          setMemos(res.data || []);
          setError(null);
        } catch (err) {
          setError('노트를 불러올 수 없습니다.');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { fetchMemos(); }, [fetchMemos]);

      const selectedMemo = useMemo(
        () => memos.find((m) => m.id === selectedId) || null,
        [memos, selectedId]
      );

      const handleNewMemo = useCallback(async () => {
        try {
          const res = await apiCall('/memos', {
            method: 'POST',
            body: JSON.stringify({ title: '', content: '' }),
          });
          const newMemo = res.data;
          setMemos((prev) => [newMemo, ...prev]);
          setSelectedId(newMemo.id);
          if (isMobile) setMobileView('editor');

          setTimeout(() => {
            if (editorRef.current && editorRef.current.focusTitle) {
              editorRef.current.focusTitle();
            }
          }, 150);
        } catch (err) {
          console.error('노트 생성 실패:', err);
        }
      }, [isMobile]);

      const handleUpdate = useCallback(async (id, title, content) => {
        try {
          const res = await apiCall(`/memos/${id}`, {
            method: 'PUT',
            body: JSON.stringify({ title, content }),
          });
          setMemos((prev) =>
            prev.map((m) => (m.id === id ? { ...m, ...res.data } : m))
          );
        } catch (err) {
          console.error('노트 저장 실패:', err);
        }
      }, []);

      const handleDelete = useCallback(async (id) => {
        try {
          await apiCall(`/memos/${id}`, { method: 'DELETE' });
          setMemos((prev) => prev.filter((m) => m.id !== id));
          if (selectedId === id) {
            setSelectedId(null);
            if (isMobile) setMobileView('list');
          }
          try { localStorage.removeItem(`memo_color_${id}`); } catch {}
        } catch (err) {
          console.error('노트 삭제 실패:', err);
        }
      }, [selectedId, isMobile]);

      const handleSelect = useCallback((id) => {
        setSelectedId(id);
        if (isMobile) setMobileView('editor');
      }, [isMobile]);

      // Loading state
      if (loading) {
        return (
          <div className="flex items-center justify-center h-screen" style={{ backgroundColor: '#F5F0E8' }}>
            <div className="text-center">
              <div className="animate-spin w-8 h-8 border-2 rounded-full mx-auto mb-4" style={{ borderColor: '#E8DFD0', borderTopColor: '#C9A84C' }}></div>
              <p className="font-playfair text-sm" style={{ color: '#1E3932' }}>Loading your diary...</p>
            </div>
          </div>
        );
      }

      // Error state
      if (error) {
        return (
          <div className="flex items-center justify-center h-screen" style={{ backgroundColor: '#F5F0E8' }}>
            <div className="text-center">
              <span className="text-4xl block mb-3">&#9749;</span>
              <p className="text-sm mb-4" style={{ color: '#8B7E6A' }}>{error}</p>
              <button
                onClick={fetchMemos}
                className="px-5 py-2.5 rounded-lg text-sm font-semibold transition-colors hover:opacity-90"
                style={{ backgroundColor: '#1E3932', color: '#C9A84C' }}
              >
                다시 시도
              </button>
            </div>
          </div>
        );
      }

      // Mobile layout
      if (isMobile) {
        return (
          <div className="flex flex-col h-screen">
            {mobileView === 'list' && (
              <>
                <div
                  className="flex items-center justify-between px-5 py-4"
                  style={{ backgroundColor: '#1E3932' }}
                >
                  <div className="flex items-center gap-2">
                    <span className="text-xl">&#9749;</span>
                    <span className="font-playfair text-lg font-bold text-white tracking-wider">MY DIARY</span>
                    <span
                      className="text-[10px] font-bold px-2 py-0.5 rounded-full ml-2"
                      style={{ backgroundColor: '#C9A84C', color: '#1E3932' }}
                    >
                      {memos.length}
                    </span>
                  </div>
                  <button
                    onClick={handleNewMemo}
                    className="w-9 h-9 flex items-center justify-center rounded-lg transition-colors"
                    style={{ backgroundColor: '#C9A84C', color: '#1E3932' }}
                    aria-label="새 노트"
                  >
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                      <line x1="12" y1="5" x2="12" y2="19"/>
                      <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                  </button>
                </div>
                <MemoList
                  memos={memos}
                  selectedId={selectedId}
                  onSelect={handleSelect}
                  onDelete={handleDelete}
                  isMobile={true}
                  onBack={() => setMobileView('list')}
                />
              </>
            )}
            {mobileView === 'editor' && (
              <Editor
                memo={selectedMemo}
                onUpdate={handleUpdate}
                isMobile={true}
                onBack={() => setMobileView('list')}
                editorRef={editorRef}
              />
            )}
          </div>
        );
      }

      // Desktop layout
      return (
        <div className="flex h-screen">
          <Sidebar memoCount={memos.length} onNewMemo={handleNewMemo} />

          <MemoList
            memos={memos}
            selectedId={selectedId}
            onSelect={handleSelect}
            onDelete={handleDelete}
            isMobile={false}
          />

          <Editor
            memo={selectedMemo}
            onUpdate={handleUpdate}
            isMobile={false}
            editorRef={editorRef}
          />
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
