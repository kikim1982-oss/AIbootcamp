<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .line-through-anim {
      transition: all 0.2s ease;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useMemo, useEffect } = React;
    const API_BASE_URL = '/api';

    // ========================================
    // Design System Components
    // ========================================

    function Button({ children, onClick, variant = "primary", size = "md", disabled = false, className = "" }) {
      const base = "font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 cursor-pointer";
      const variants = {
        primary: "bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-500",
        secondary: "bg-gray-200 text-gray-700 hover:bg-gray-300 focus:ring-gray-400",
        danger: "bg-red-500 text-white hover:bg-red-600 focus:ring-red-400",
        ghost: "bg-transparent text-gray-500 hover:bg-gray-100 focus:ring-gray-300",
      };
      const sizes = {
        sm: "px-3 py-1.5 text-sm",
        md: "px-4 py-2 text-base",
        lg: "px-6 py-3 text-lg",
      };
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${disabled ? "opacity-50 cursor-not-allowed" : ""} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Input({ value, onChange, placeholder, onKeyDown, className = "" }) {
      return (
        <input
          type="text"
          value={value}
          onChange={onChange}
          onKeyDown={onKeyDown}
          placeholder={placeholder}
          className={`w-full border border-gray-300 rounded-lg px-4 py-2.5 text-base focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-shadow ${className}`}
        />
      );
    }

    // ========================================
    // Todo Item Component
    // ========================================

    function TodoItem({ todo, onToggle, onDelete }) {
      return (
        <li className="flex items-center gap-3 px-4 py-3 bg-white rounded-lg border border-gray-100 shadow-sm hover:shadow transition-shadow group">
          <input
            type="checkbox"
            checked={todo.done}
            onChange={() => onToggle(todo.id)}
            className="w-5 h-5 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer shrink-0"
          />
          <span
            className={`flex-1 text-base line-through-anim ${
              todo.done ? "line-through text-gray-400" : "text-gray-800"
            }`}
          >
            {todo.text}
          </span>
          <button
            onClick={() => onDelete(todo.id)}
            className="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 transition-all cursor-pointer p-1"
            aria-label="삭제"
          >
            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path fillRule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clipRule="evenodd" />
            </svg>
          </button>
        </li>
      );
    }

    // ========================================
    // Filter Tabs Component
    // ========================================

    function FilterTabs({ current, onChange, counts }) {
      const filters = [
        { key: "all", label: "전체", count: counts.all },
        { key: "active", label: "미완료", count: counts.active },
        { key: "done", label: "완료", count: counts.done },
      ];
      return (
        <div className="flex gap-1 bg-gray-100 rounded-lg p-1">
          {filters.map((f) => (
            <button
              key={f.key}
              onClick={() => onChange(f.key)}
              className={`flex-1 px-3 py-1.5 text-sm font-medium rounded-md transition-colors cursor-pointer ${
                current === f.key
                  ? "bg-white text-indigo-600 shadow-sm"
                  : "text-gray-500 hover:text-gray-700"
              }`}
            >
              {f.label}
              <span className="ml-1 text-xs opacity-70">({f.count})</span>
            </button>
          ))}
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================

    function App() {
      const [todos, setTodos] = useState([]);
      const [input, setInput] = useState("");
      const [filter, setFilter] = useState("all");
      const [loading, setLoading] = useState(true);

      // 서버에서 todo 목록 로드
      useEffect(() => {
        fetch(`${API_BASE_URL}/todos`)
          .then(res => res.json())
          .then(({ data }) => setTodos(data))
          .catch(console.error)
          .finally(() => setLoading(false));
      }, []);

      const addTodo = useCallback(() => {
        const text = input.trim();
        if (!text) return;
        fetch(`${API_BASE_URL}/todos`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        })
          .then(res => res.json())
          .then(({ data }) => {
            setTodos((prev) => [data, ...prev]);
            setInput("");
          })
          .catch(console.error);
      }, [input]);

      const toggleTodo = useCallback((id) => {
        fetch(`${API_BASE_URL}/todos/${id}/toggle`, { method: 'PATCH' })
          .then(res => res.json())
          .then(({ data }) => {
            setTodos((prev) => prev.map((t) => (t.id === id ? { ...t, done: data.done } : t)));
          })
          .catch(console.error);
      }, []);

      const deleteTodo = useCallback((id) => {
        fetch(`${API_BASE_URL}/todos/${id}`, { method: 'DELETE' })
          .then(res => res.json())
          .then(() => {
            setTodos((prev) => prev.filter((t) => t.id !== id));
          })
          .catch(console.error);
      }, []);

      const counts = useMemo(() => ({
        all: todos.length,
        active: todos.filter((t) => !t.done).length,
        done: todos.filter((t) => t.done).length,
      }), [todos]);

      const filtered = useMemo(() => {
        if (filter === "active") return todos.filter((t) => !t.done);
        if (filter === "done") return todos.filter((t) => t.done);
        return todos;
      }, [todos, filter]);

      const handleKeyDown = (e) => {
        if (e.key === "Enter") addTodo();
      };

      return (
        <div className="max-w-lg mx-auto px-4 py-12">
          <h1 className="text-3xl font-bold text-gray-900 text-center mb-8">
            Todo
          </h1>

          {/* Input Area */}
          <div className="flex gap-2 mb-6">
            <Input
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={handleKeyDown}
              placeholder="할 일을 입력하세요"
            />
            <Button onClick={addTodo} className="shrink-0">
              추가
            </Button>
          </div>

          {/* Filter */}
          <div className="mb-4">
            <FilterTabs current={filter} onChange={setFilter} counts={counts} />
          </div>

          {/* Todo List */}
          {loading ? (
            <div className="text-center py-16 text-gray-400">불러오는 중...</div>
          ) : filtered.length === 0 ? (
            <div className="text-center py-16 text-gray-400">
              {todos.length === 0
                ? "할 일을 추가해 보세요"
                : "해당하는 항목이 없습니다"}
            </div>
          ) : (
            <ul className="flex flex-col gap-2">
              {filtered.map((todo) => (
                <TodoItem
                  key={todo.id}
                  todo={todo}
                  onToggle={toggleTodo}
                  onDelete={deleteTodo}
                />
              ))}
            </ul>
          )}
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
