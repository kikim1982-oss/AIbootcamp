<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Bootcamp - Quest Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #d4a373; border-radius: 3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes slideDown {
      from { opacity: 0; max-height: 0; }
      to { opacity: 1; max-height: 600px; }
    }
    .slide-down { animation: slideDown 0.3s ease-out forwards; overflow: hidden; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
    .percent-bar { transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // 1. React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // ========================================
    // 2. Common Utilities
    // ========================================
    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr);
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return '방금 전';
      if (mins < 60) return `${mins}분 전`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}시간 전`;
      return `${Math.floor(hours / 24)}일 전`;
    }

    function formatMoney(n) {
      return Number(n).toLocaleString();
    }

    // ========================================
    // 3. Q3 - AI Recipe (R3_ prefix)
    // ========================================
    const R3_API_BASE = '/api';

    function R3_Badge({ children, color = 'blue', className = '' }) {
      const colorMap = {
        blue: 'bg-blue-100 text-blue-700 border border-blue-200',
        purple: 'bg-purple-100 text-purple-700 border border-purple-200',
        green: 'bg-green-100 text-green-700 border border-green-200',
        amber: 'bg-amber-100 text-amber-700 border border-amber-200',
        indigo: 'bg-indigo-100 text-indigo-700 border border-indigo-200',
        emerald: 'bg-emerald-100 text-emerald-700 border border-emerald-200',
      };
      return (
        <span className={`inline-block px-2 py-0.5 rounded-full text-xs font-semibold ${colorMap[color] || colorMap.blue} ${className}`}>
          {children}
        </span>
      );
    }

    function R3_Button({ children, variant = 'primary', size = 'md', onClick, className = '', disabled = false }) {
      const variants = {
        primary: 'bg-amber-500 hover:bg-amber-600 text-white shadow-sm',
        secondary: 'bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 shadow-sm',
        danger: 'bg-red-400 hover:bg-red-500 text-white shadow-sm',
        ghost: 'bg-transparent hover:bg-black/5 text-gray-600',
        indigo: 'bg-indigo-500 hover:bg-indigo-600 text-white shadow-sm',
        emerald: 'bg-emerald-500 hover:bg-emerald-600 text-white shadow-sm',
      };
      const sizes = {
        sm: 'px-2.5 py-1 text-xs rounded-md',
        md: 'px-4 py-2 text-sm rounded-lg',
        lg: 'px-6 py-2.5 text-base rounded-lg',
      };
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`font-medium transition-colors duration-150 ${variants[variant] || variants.primary} ${sizes[size]} ${disabled ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'} ${className}`}
        >
          {children}
        </button>
      );
    }

    function R3_Input({ label, value, onChange, placeholder, className = '', type = 'text' }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>}
          <input
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent bg-white"
          />
        </div>
      );
    }

    function R3_Textarea({ label, value, onChange, placeholder, rows = 3, className = '' }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>}
          <textarea
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            rows={rows}
            className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent bg-white resize-vertical"
          />
        </div>
      );
    }

    function R3_Card({ children, className = '' }) {
      return (
        <div className={`bg-white/80 backdrop-blur-sm rounded-xl shadow-sm border border-white/50 ${className}`}>
          {children}
        </div>
      );
    }

    function R3_Modal({ isOpen, onClose, title, children }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center" role="dialog" aria-modal="true">
          <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose}></div>
          <div className="relative bg-white rounded-2xl shadow-xl w-full max-w-lg mx-4 p-6 max-h-[90vh] overflow-y-auto">
            <div className="flex items-center justify-between mb-5">
              <h2 className="text-lg font-bold text-gray-800">{title}</h2>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl leading-none cursor-pointer" aria-label="닫기">&times;</button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    function R3_Spinner({ text = '로딩 중...' }) {
      return (
        <div className="flex flex-col items-center justify-center py-8 gap-3">
          <div className="w-8 h-8 border-4 border-amber-200 border-t-amber-500 rounded-full animate-spin"></div>
          <p className="text-sm text-gray-500">{text}</p>
        </div>
      );
    }

    function R3_ErrorBanner({ message, onDismiss }) {
      if (!message) return null;
      return (
        <div className="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-2 flex items-center justify-between">
          <span>{message}</span>
          <button onClick={onDismiss} className="text-red-400 hover:text-red-600 ml-2 cursor-pointer">&times;</button>
        </div>
      );
    }

    function R3_IngredientCard({ ingredient, onEdit, onDelete }) {
      const categoryColor = { '냉장': 'blue', '냉동': 'purple', '상온': 'green' };
      return (
        <R3_Card className="p-3 flex items-center justify-between">
          <div className="flex items-center gap-3 min-w-0">
            <span className="text-sm font-semibold text-gray-800 truncate">{ingredient.name}</span>
            <R3_Badge color={categoryColor[ingredient.category]}>{ingredient.category}</R3_Badge>
          </div>
          <div className="flex items-center gap-2 flex-shrink-0">
            <span className="text-sm text-gray-500 font-medium">{ingredient.amount}</span>
            <button onClick={() => onEdit(ingredient)} className="text-sm hover:bg-amber-100 rounded p-0.5 cursor-pointer transition-colors" aria-label="수정" title="수정">&#x270F;&#xFE0F;</button>
            <button onClick={() => onDelete(ingredient.id)} className="text-sm hover:bg-red-100 rounded p-0.5 cursor-pointer transition-colors" aria-label="삭제" title="삭제">&#x1F5D1;&#xFE0F;</button>
          </div>
        </R3_Card>
      );
    }

    function R3_IngredientFormModal({ isOpen, onClose, onSave, editingIngredient }) {
      const [name, setName] = useState('');
      const [amount, setAmount] = useState('');
      const [category, setCategory] = useState('냉장');

      useEffect(() => {
        if (editingIngredient) {
          setName(editingIngredient.name);
          setAmount(editingIngredient.amount);
          setCategory(editingIngredient.category);
        } else {
          setName(''); setAmount(''); setCategory('냉장');
        }
      }, [editingIngredient, isOpen]);

      const handleSave = () => {
        if (!name.trim() || !amount.trim()) return;
        onSave({ name: name.trim(), amount: amount.trim(), category });
      };

      return (
        <R3_Modal isOpen={isOpen} onClose={onClose} title={editingIngredient ? '재료 수정' : '재료 추가'}>
          <div className="space-y-4">
            <R3_Input label="재료명" value={name} onChange={e => setName(e.target.value)} placeholder="예: 양파" />
            <R3_Input label="수량" value={amount} onChange={e => setAmount(e.target.value)} placeholder="예: 2개, 300g" />
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">보관 분류</label>
              <select value={category} onChange={e => setCategory(e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent bg-white cursor-pointer">
                <option value="냉장">냉장</option>
                <option value="냉동">냉동</option>
                <option value="상온">상온</option>
              </select>
            </div>
            <div className="flex justify-end gap-2 pt-2">
              <R3_Button variant="secondary" onClick={onClose}>취소</R3_Button>
              <R3_Button variant="primary" onClick={handleSave} disabled={!name.trim() || !amount.trim()}>저장</R3_Button>
            </div>
          </div>
        </R3_Modal>
      );
    }

    function R3_AIIngredientModal({ isOpen, onClose, onIngredientsAdded, currentIngredients }) {
      const [count, setCount] = useState(5);
      const [loading, setLoading] = useState(false);
      const [suggestions, setSuggestions] = useState([]);
      const [selected, setSelected] = useState({});
      const [error, setError] = useState(null);
      const [saving, setSaving] = useState(false);
      const countOptions = [1, 2, 5];

      useEffect(() => {
        if (isOpen) { setCount(10); setSuggestions([]); setSelected({}); setError(null); }
      }, [isOpen]);

      const handleGenerate = async () => {
        setLoading(true); setError(null); setSuggestions([]); setSelected({});
        try {
          const existing = (currentIngredients || []).map(i => i.name);
          const res = await fetch(`${R3_API_BASE}/ai/ingredients`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ count, existing }),
          });
          const json = await res.json();
          if (json.success && json.data) {
            setSuggestions(json.data);
            const all = {}; json.data.forEach((_, i) => { all[i] = true; }); setSelected(all);
          } else { setError(json.message || 'AI 추천을 받지 못했습니다.'); }
        } catch { setError('AI 서버에 연결할 수 없습니다.'); }
        finally { setLoading(false); }
      };

      const toggleSelect = (idx) => { setSelected(prev => ({ ...prev, [idx]: !prev[idx] })); };
      const toggleAll = () => {
        const allSelected = suggestions.every((_, i) => selected[i]);
        const next = {};
        if (!allSelected) suggestions.forEach((_, i) => { next[i] = true; });
        setSelected(next);
      };

      const handleAddSelected = async () => {
        const items = suggestions.filter((_, i) => selected[i]);
        if (items.length === 0) return;
        setSaving(true); setError(null);
        try {
          for (const item of items) {
            await fetch(`${R3_API_BASE}/ingredients`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: item.name, amount: item.amount, category: item.category || '냉장' }),
            });
          }
          onIngredientsAdded(); onClose();
        } catch { setError('재료 저장 중 오류가 발생했습니다.'); }
        finally { setSaving(false); }
      };

      const selectedCount = Object.values(selected).filter(Boolean).length;

      return (
        <R3_Modal isOpen={isOpen} onClose={onClose} title="AI 재료 추천">
          <div className="space-y-4">
            <div>
              <p className="text-sm font-medium text-gray-700 mb-2">생성 개수 선택</p>
              <div className="flex gap-2">
                {countOptions.map(n => (
                  <button key={n} onClick={() => setCount(n)} className={`flex-1 py-2 rounded-lg text-sm font-semibold cursor-pointer border transition-colors ${count === n ? 'bg-indigo-500 text-white border-indigo-500' : 'bg-white text-gray-700 border-gray-300 hover:bg-indigo-50'}`}>{n}개</button>
                ))}
              </div>
            </div>
            <R3_Button variant="indigo" onClick={handleGenerate} disabled={loading} className="w-full">
              {loading ? '생성 중...' : `AI 재료 ${count}개 생성`}
            </R3_Button>
            {error && <R3_ErrorBanner message={error} onDismiss={() => setError(null)} />}
            {loading && <R3_Spinner text="AI가 재료를 추천하고 있어요..." />}
            {suggestions.length > 0 && !loading && (
              <div>
                <div className="flex items-center justify-between mb-2">
                  <p className="text-sm font-medium text-gray-700">추천 재료 ({suggestions.length}개)</p>
                  <button onClick={toggleAll} className="text-xs text-indigo-600 hover:text-indigo-800 cursor-pointer">
                    {suggestions.every((_, i) => selected[i]) ? '전체 해제' : '전체 선택'}
                  </button>
                </div>
                <div className="space-y-1.5 max-h-60 overflow-y-auto scrollbar-thin">
                  {suggestions.map((item, idx) => (
                    <label key={idx} className={`flex items-center gap-3 p-2.5 rounded-lg border cursor-pointer transition-colors ${selected[idx] ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-gray-200 hover:bg-gray-50'}`}>
                      <input type="checkbox" checked={!!selected[idx]} onChange={() => toggleSelect(idx)} className="w-4 h-4 text-indigo-600 rounded cursor-pointer" />
                      <span className="text-sm font-medium text-gray-800 flex-1">{item.name}</span>
                      <span className="text-xs text-gray-500">{item.amount}</span>
                      <R3_Badge color={item.category === '냉동' ? 'purple' : item.category === '상온' ? 'green' : 'blue'}>{item.category || '냉장'}</R3_Badge>
                    </label>
                  ))}
                </div>
                <div className="flex justify-end gap-2 pt-3">
                  <R3_Button variant="secondary" onClick={onClose}>취소</R3_Button>
                  <R3_Button variant="indigo" onClick={handleAddSelected} disabled={selectedCount === 0 || saving}>
                    {saving ? '저장 중...' : `선택 추가 (${selectedCount}개)`}
                  </R3_Button>
                </div>
              </div>
            )}
          </div>
        </R3_Modal>
      );
    }

    function R3_AIRecipeGenerateModal({ isOpen, onClose, onRecipeSaved }) {
      const [style, setStyle] = useState('');
      const [loading, setLoading] = useState(false);
      const [generatedRecipe, setGeneratedRecipe] = useState(null);
      const [error, setError] = useState(null);
      const [saving, setSaving] = useState(false);
      const styles = ['간단 요리', '다이어트', '야식', '한식', '기타'];

      useEffect(() => {
        if (isOpen) { setStyle(''); setGeneratedRecipe(null); setError(null); }
      }, [isOpen]);

      const handleGenerate = async () => {
        setLoading(true); setError(null); setGeneratedRecipe(null);
        try {
          const res = await fetch(`${R3_API_BASE}/ai/recipes/generate`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ style }),
          });
          const json = await res.json();
          if (json.success && json.data) { setGeneratedRecipe(json.data); }
          else { setError(json.message || '레시피 생성에 실패했습니다.'); }
        } catch { setError('AI 서버에 연결할 수 없습니다.'); }
        finally { setLoading(false); }
      };

      const handleSave = async () => {
        if (!generatedRecipe) return;
        setSaving(true); setError(null);
        try {
          const res = await fetch(`${R3_API_BASE}/ai-recipes`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: generatedRecipe.title, ingredients: generatedRecipe.ingredients, steps: generatedRecipe.steps }),
          });
          const json = await res.json();
          if (json.success) { onRecipeSaved(); onClose(); }
          else { setError(json.message || '저장에 실패했습니다.'); }
        } catch { setError('저장 중 오류가 발생했습니다.'); }
        finally { setSaving(false); }
      };

      const handleRegenerate = () => { setGeneratedRecipe(null); handleGenerate(); };

      return (
        <R3_Modal isOpen={isOpen} onClose={onClose} title="AI 레시피 생성">
          <div className="space-y-4">
            {!generatedRecipe && !loading && (
              <>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">요리 스타일 선택</label>
                  <div className="flex flex-wrap gap-2">
                    {styles.map(s => (
                      <button key={s} onClick={() => setStyle(s)} className={`px-4 py-2 rounded-lg text-sm font-medium cursor-pointer transition-colors border ${style === s ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'}`}>{s}</button>
                    ))}
                  </div>
                </div>
                <div className="flex justify-end gap-2 pt-2">
                  <R3_Button variant="secondary" onClick={onClose}>취소</R3_Button>
                  <R3_Button variant="emerald" onClick={handleGenerate}>레시피 생성</R3_Button>
                </div>
              </>
            )}
            {error && <R3_ErrorBanner message={error} onDismiss={() => setError(null)} />}
            {loading && <R3_Spinner text="AI가 레시피를 만들고 있어요..." />}
            {generatedRecipe && !loading && (
              <div>
                <R3_Card className="p-4 mb-4">
                  <div className="flex items-center gap-2 mb-3">
                    <h3 className="text-lg font-bold text-gray-800">{generatedRecipe.title}</h3>
                    <R3_Badge color="emerald">AI 생성</R3_Badge>
                  </div>
                  <div className="mb-3">
                    <span className="text-xs font-semibold text-emerald-600 uppercase tracking-wide">재료</span>
                    <p className="text-sm text-gray-600 mt-1 whitespace-pre-line">{generatedRecipe.ingredients}</p>
                  </div>
                  <div>
                    <span className="text-xs font-semibold text-emerald-600 uppercase tracking-wide">조리법</span>
                    <p className="text-sm text-gray-600 mt-1 whitespace-pre-line">{generatedRecipe.steps}</p>
                  </div>
                </R3_Card>
                <div className="flex justify-end gap-2">
                  <R3_Button variant="secondary" onClick={onClose}>취소</R3_Button>
                  <R3_Button variant="secondary" onClick={handleRegenerate}>다시 생성</R3_Button>
                  <R3_Button variant="emerald" onClick={handleSave} disabled={saving}>{saving ? '저장 중...' : '저장'}</R3_Button>
                </div>
              </div>
            )}
          </div>
        </R3_Modal>
      );
    }

    function R3_IngredientPanel() {
      const [ingredients, setIngredients] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [modalOpen, setModalOpen] = useState(false);
      const [editingIngredient, setEditingIngredient] = useState(null);
      const [aiIngredientModalOpen, setAiIngredientModalOpen] = useState(false);

      const fetchIngredients = useCallback(async () => {
        try { setError(null); const res = await fetch(`${R3_API_BASE}/ingredients`); const json = await res.json();
          if (json.success) { setIngredients(json.data); } else { setError(json.message || '재료 목록을 불러오지 못했습니다.'); }
        } catch { setError('서버에 연결할 수 없습니다.'); } finally { setLoading(false); }
      }, []);

      useEffect(() => { fetchIngredients(); }, [fetchIngredients]);

      const handleNew = () => { setEditingIngredient(null); setModalOpen(true); };
      const handleEdit = (ingredient) => { setEditingIngredient(ingredient); setModalOpen(true); };
      const handleDelete = async (id) => {
        try { const res = await fetch(`${R3_API_BASE}/ingredients/${id}`, { method: 'DELETE' }); const json = await res.json();
          if (json.success) { await fetchIngredients(); } else { setError(json.message || '삭제에 실패했습니다.'); }
        } catch { setError('삭제 중 오류가 발생했습니다.'); }
      };
      const handleSave = async (data) => {
        try {
          const isEdit = !!editingIngredient;
          const url = isEdit ? `${R3_API_BASE}/ingredients/${editingIngredient.id}` : `${R3_API_BASE}/ingredients`;
          const res = await fetch(url, { method: isEdit ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
          const json = await res.json();
          if (json.success) { await fetchIngredients(); setModalOpen(false); setEditingIngredient(null); }
          else { setError(json.message || '저장에 실패했습니다.'); }
        } catch { setError('저장 중 오류가 발생했습니다.'); }
      };

      return (
        <div className="h-full flex flex-col">
          <div className="px-4 py-4 border-b border-amber-200/50">
            <div className="flex items-center justify-between mb-3">
              <div>
                <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2"><span className="text-xl">&#x1F9CA;</span> 냉장고 재료</h2>
                <p className="text-xs text-gray-500 mt-0.5">총 {ingredients.length}개의 재료</p>
              </div>
              <R3_Button variant="primary" size="sm" onClick={handleNew}>+ 재료 추가</R3_Button>
            </div>
            <div className="flex gap-2">
              <R3_Button variant="indigo" size="sm" onClick={() => setAiIngredientModalOpen(true)} className="flex-1">&#x1F916; AI 재료 추천</R3_Button>
            </div>
          </div>

    function R3_RecipeFormModal({ isOpen, onClose, onSave, editingRecipe }) {

      const [steps, setSteps] = useState('');

        if (editingRecipe) { setTitle(editingRecipe.title); setIngredients(editingRecipe.ingredients); setSteps(editingRecipe.steps); }
        else { setTitle(''); setIngredients(''); setSteps(''); }

        if (!title.trim()) return;
        onSave({ title: title.trim(), ingredients: ingredients.trim(), steps: steps.trim() });
      };

      return (
        <R3_Modal isOpen={isOpen} onClose={onClose} title={editingRecipe ? '레시피 수정' : '새 레시피 등록'}>

    function R3_RecipePanel() {
      const [recipes, setRecipes] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [modalOpen, setModalOpen] = useState(false);
      const [editingRecipe, setEditingRecipe] = useState(null);

      const fetchRecipes = useCallback(async () => {
        try { setError(null); const res = await fetch(`${R3_API_BASE}/recipes`); const json = await res.json();
          if (json.success) { setRecipes(json.data); } else { setError(json.message || '레시피 목록을 불러오지 못했습니다.'); }
        } catch { setError('서버에 연결할 수 없습니다.'); } finally { setLoading(false); }
      }, []);

      useEffect(() => { fetchRecipes(); }, [fetchRecipes]);

      const handleNew = () => { setEditingRecipe(null); setModalOpen(true); };
      const handleEdit = (recipe) => { setEditingRecipe(recipe); setModalOpen(true); };
      const handleDelete = async (id) => {
        try { const res = await fetch(`${R3_API_BASE}/recipes/${id}`, { method: 'DELETE' }); const json = await res.json();
          if (json.success) { await fetchRecipes(); } else { setError(json.message || '삭제에 실패했습니다.'); }
        } catch { setError('삭제 중 오류가 발생했습니다.'); }
      };
      const handleSave = async (data) => {
        try {
          const isEdit = !!editingRecipe;
          const url = isEdit ? `${R3_API_BASE}/recipes/${editingRecipe.id}` : `${R3_API_BASE}/recipes`;
          const res = await fetch(url, { method: isEdit ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
          const json = await res.json();
          if (json.success) { await fetchRecipes(); setModalOpen(false); setEditingRecipe(null); }
          else { setError(json.message || '저장에 실패했습니다.'); }
        } catch { setError('저장 중 오류가 발생했습니다.'); }
      };

      return (
        <div className="h-full flex flex-col">
          <div className="px-5 py-4 border-b border-amber-200/50 flex items-center justify-between">

              <div className="text-center py-16 text-gray-400"><p className="text-sm">불러오는 중...</p></div>
            ) : recipes.length === 0 ? (
              <div className="text-center py-16 text-gray-400"><p className="text-4xl mb-3">&#x1F4DD;</p><p className="text-sm">등록된 레시피가 없습니다.</p><p className="text-xs mt-1">새 레시피를 추가해보세요!</p></div>
            ) : (
              recipes.map(recipe => (<R3_RecipeCard key={recipe.id} recipe={recipe} onEdit={handleEdit} onDelete={handleDelete} />))

          </div>
          <R3_RecipeFormModal isOpen={modalOpen} onClose={() => { setModalOpen(false); setEditingRecipe(null); }} onSave={handleSave} editingRecipe={editingRecipe} />
        </div>

    const R4_API_BASE_URL = '/api';

    async function R4_fetchQuestions() {
      const res = await fetch(`${R4_API_BASE_URL}/questions`); return res.json();
    }
    async function R4_postVote(questionId, choice) {
      const res = await fetch(`${R4_API_BASE_URL}/questions/${questionId}/vote`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ choice })
      }); return res.json();

    async function R4_createQuestion(data) {
      const res = await fetch(`${R4_API_BASE_URL}/questions`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
      }); return res.json();

      const res = await fetch(`${R4_API_BASE_URL}/ai/generate`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usedQuestions })

    const R4_CATEGORIES = [
      { key: 'all', label: '전체', emoji: '' },

      { key: '직장', label: '직장', emoji: '💼' },
      { key: '음식', label: '음식', emoji: '🍔' },
      { key: '라이프', label: '라이프', emoji: '🌿' },

    const R4_categoryMeta = {
      '돈': { label: '돈', emoji: '💰', color: 'bg-yellow-100 text-yellow-700' },
      '직장': { label: '직장', emoji: '💼', color: 'bg-indigo-100 text-indigo-700' },
      '음식': { label: '음식', emoji: '🍔', color: 'bg-orange-100 text-orange-700' },

    function R4_Badge({ emoji, label, colorClass, className = '' }) {
      return (<span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium ${colorClass} ${className}`}>{emoji && <span>{emoji}</span>}{label}</span>);

    function R4_Button({ children, variant = 'primary', size = 'md', disabled = false, onClick, className = '', type = 'button' }) {
      const base = 'inline-flex items-center justify-center font-medium transition-all duration-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-300';
      const variants = {
        primary: 'bg-blue-500 text-white hover:bg-blue-600 active:bg-blue-700 disabled:bg-blue-300',
        secondary: 'bg-white text-blue-600 border-2 border-blue-400 hover:bg-blue-50 active:bg-blue-100 disabled:border-blue-200 disabled:text-blue-300',
        ghost: 'bg-transparent text-gray-500 hover:bg-gray-100 active:bg-gray-200 border border-gray-200',
        choice: 'bg-white text-gray-700 border-2 border-blue-300 hover:bg-blue-50 hover:border-blue-500 hover:text-blue-600 active:bg-blue-100',
      };
      const sizes = { sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2.5 text-sm', lg: 'px-6 py-3 text-base' };
      return (<button type={type} disabled={disabled} onClick={onClick} className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>{children}</button>);
    }

        <div className={className}>

        <header className="bg-blue-500 text-white px-4 py-4 shadow-md">
          <div className="max-w-lg mx-auto flex items-center gap-2">
            <span className="text-2xl">&#x2696;&#xFE0F;</span>

          </div>

    function R4_CreateQuestionForm({ onSubmit }) {
      const [isOpen, setIsOpen] = useState(false);
      const [title, setTitle] = useState('');
      const [choiceA, setChoiceA] = useState('');
      const [choiceB, setChoiceB] = useState('');
      const [category, setCategory] = useState('돈');
      const [aiMode, setAiMode] = useState(false);
      const [aiLoading, setAiLoading] = useState(false);
      const [aiError, setAiError] = useState('');
      const [usedAiQuestions, setUsedAiQuestions] = useState([]);

      const catOptions = R4_CATEGORIES.filter(c => c.key !== 'all').map(c => ({ value: c.key, label: `${c.emoji} ${c.label}` }));

      const resetForm = () => { setTitle(''); setChoiceA(''); setChoiceB(''); setCategory('돈'); setAiMode(false); setAiError(''); setIsOpen(false); setUsedAiQuestions([]); };

      const handleAIGenerate = async () => {
        setAiLoading(true); setAiError(''); setIsOpen(true);
        try {
          const res = await R4_generateAIQuestion(usedAiQuestions);
          if (!res.success) throw new Error(res.message);
          setTitle(res.data.title || ''); setChoiceA(res.data.choiceA); setChoiceB(res.data.choiceB); setCategory(res.data.category || '라이프');
          setUsedAiQuestions(prev => [...prev, `${res.data.choiceA} vs ${res.data.choiceB}`]);
          setAiMode(true);
        } catch (e) { setAiError('AI 생성 실패. 다시 시도해주세요.'); setAiMode(false); }
        finally { setAiLoading(false); }
      };

      const handleSubmit = useCallback((e) => {
        e.preventDefault();
        if (!choiceA.trim() || !choiceB.trim()) return;
        onSubmit({ title: title.trim() || null, choiceA: choiceA.trim(), choiceB: choiceB.trim(), category });
        resetForm();
      }, [title, choiceA, choiceB, category, onSubmit]);

      const handleAISubmit = async () => {
        await onSubmit({ title: title || null, choiceA, choiceB, category });
        resetForm();
      };

      const meta = R4_categoryMeta[category] || { label: category, emoji: '?', color: 'bg-gray-100 text-gray-600' };

      return (
        <div className="max-w-lg mx-auto px-4 mt-4">
          <R4_Card>
            <div className="flex items-center gap-2 px-4 py-3">

                <span className="text-blue-500 text-lg">+</span> 새 질문 만들기
                <svg className={`w-4 h-4 text-gray-400 transition-transform duration-300 ${isOpen && !aiMode ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
              </button>
              <button onClick={handleAIGenerate} disabled={aiLoading} className="flex items-center gap-1.5 px-3.5 py-2 rounded-xl bg-gradient-to-r from-violet-500 to-blue-500 text-white text-xs font-semibold hover:opacity-90 active:opacity-80 transition-all disabled:opacity-60 shadow-sm">
                {aiLoading ? <span className="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin inline-block" /> : <span>&#x2728;</span>} AI로 만들기
              </button>
            </div>
            {isOpen && (
              <div className="px-5 pb-5 pt-1 slide-down">
                {aiLoading && (<div className="flex flex-col items-center py-6 gap-3"><div className="w-8 h-8 border-4 border-violet-400 border-t-transparent rounded-full animate-spin" /><p className="text-sm text-gray-500">AI가 질문을 만들고 있어요...</p></div>)}
                {!aiLoading && aiMode && (
                  <div className="space-y-3">
                    <div className="bg-gradient-to-br from-violet-50 to-blue-50 border border-violet-200 rounded-2xl p-4">
                      <div className="flex items-center gap-1.5 mb-3">
                        <span className="text-xs font-bold text-violet-600 bg-violet-100 px-2 py-0.5 rounded-full">&#x2728; AI 생성</span>
                        {title && <span className="text-xs text-gray-500 font-medium">{title}</span>}
                      </div>
                      <div className="space-y-2">
                        <div className="flex items-center gap-2 bg-white rounded-xl px-3 py-3 border-2 border-blue-200">
                          <span className="w-5 h-5 rounded-full bg-blue-500 text-white text-[10px] font-bold flex items-center justify-center flex-shrink-0">A</span>
                          <span className="text-sm font-medium text-gray-700">{choiceA}</span>
                        </div>
                        <div className="flex justify-center"><span className="text-xs font-bold text-gray-300">VS</span></div>
                        <div className="flex items-center gap-2 bg-white rounded-xl px-3 py-3 border-2 border-gray-200">
                          <span className="w-5 h-5 rounded-full bg-gray-400 text-white text-[10px] font-bold flex items-center justify-center flex-shrink-0">B</span>
                          <span className="text-sm font-medium text-gray-700">{choiceB}</span>
                        </div>
                      </div>
                      <div className="mt-2.5 flex justify-end">
                        <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${meta.color}`}>{meta.emoji} {meta.label}</span>
                      </div>
                    </div>
                    {aiError && <p className="text-xs text-red-500 text-center">{aiError}</p>}
                    <div className="flex gap-2 pt-1">
                      <R4_Button variant="ghost" size="md" className="flex-1" onClick={resetForm}>취소</R4_Button>
                      <R4_Button variant="secondary" size="md" className="flex-1" onClick={handleAIGenerate} disabled={aiLoading}>&#x1F504; 리프레쉬</R4_Button>
                      <R4_Button variant="primary" size="md" className="flex-1" onClick={handleAISubmit}>등록</R4_Button>
                    </div>
                  </div>
                )}
                {!aiLoading && !aiMode && (
                  <form onSubmit={handleSubmit}>
                    <div className="space-y-3">
                      <R4_Input label="제목 (선택)" value={title} onChange={e => setTitle(e.target.value)} placeholder="예: 직장인 최고의 고민" maxLength={40} />
                      <div>
                        <label className="block text-sm font-medium text-blue-600 mb-1.5">A 선택지</label>
                        <input type="text" value={choiceA} onChange={e => setChoiceA(e.target.value)} placeholder="예: 월급 500 + 주7일 출근" maxLength={50} required className="w-full px-4 py-2.5 rounded-xl border-2 border-blue-200 bg-blue-50/30 focus:bg-white focus:border-blue-400 focus:ring-2 focus:ring-blue-100 outline-none transition-all text-sm" />
                      </div>
                      <div className="flex justify-center"><span className="text-xs font-bold text-gray-400 bg-gray-100 px-3 py-1 rounded-full">VS</span></div>
                      <div>
                        <label className="block text-sm font-medium text-gray-500 mb-1.5">B 선택지</label>
                        <input type="text" value={choiceB} onChange={e => setChoiceB(e.target.value)} placeholder="예: 월급 300 + 주4일 출근" maxLength={50} required className="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 bg-gray-50 focus:bg-white focus:border-gray-400 focus:ring-2 focus:ring-gray-100 outline-none transition-all text-sm" />
                      </div>
                      <R4_Select label="카테고리" value={category} onChange={e => setCategory(e.target.value)} options={catOptions} />
                      <R4_Button type="submit" variant="primary" size="lg" className="w-full mt-2" disabled={!choiceA.trim() || !choiceB.trim()}>등록하기</R4_Button>
                    </div>
                  </form>
                )}
              </div>
            )}
          </R4_Card>
        </div>
      );
    }

    function R4_PercentBar({ percentA, percentB }) {
      const [animate, setAnimate] = useState(false);
      useEffect(() => { const t = setTimeout(() => setAnimate(true), 50); return () => clearTimeout(t); }, []);
      return (
        <div className="mt-3">
          <div className="flex justify-between text-xs font-semibold mb-1.5"><span className="text-blue-600">{percentA}%</span><span className="text-gray-400">{percentB}%</span></div>
          <div className="w-full h-3 bg-gray-100 rounded-full overflow-hidden flex">
            <div className="h-full bg-blue-500 rounded-l-full percent-bar" style={{ width: animate ? `${percentA}%` : '0%' }} />
            <div className="h-full bg-gray-300 rounded-r-full percent-bar" style={{ width: animate ? `${percentB}%` : '0%' }} />
          </div>
        </div>
      );
    }

    function R4_QuestionCard({ question, voted, onVote, onDelete }) {
      const { id, title, choiceA, choiceB, category, votesA, votesB, totalVotes } = question;
      const meta = R4_categoryMeta[category] || { label: category, emoji: '?', color: 'bg-gray-100 text-gray-600' };
      const hasVoted = voted !== null && voted !== undefined;
      const [deleting, setDeleting] = useState(false);

      const handleDelete = async () => { if (!confirm('이 질문을 삭제할까요?')) return; setDeleting(true); await onDelete(id); };

      const percentA = totalVotes > 0 ? Math.round((votesA / totalVotes) * 100) : 50;
      const percentB = totalVotes > 0 ? 100 - percentA : 50;
      const winnerA = percentA > percentB;
      const winnerB = percentB > percentA;

      return (
        <R4_Card className="fade-in-up">
          <div className="p-5">
            <div className="flex items-center justify-between mb-4">
              <R4_Badge emoji={meta.emoji} label={meta.label} colorClass={meta.color} />
              <div className="flex items-center gap-2">
                <span className="text-xs text-gray-400 font-medium">{totalVotes > 0 ? `${totalVotes}명 참여` : '아직 참여자 없음'}</span>
                <button onClick={handleDelete} disabled={deleting} className="w-6 h-6 flex items-center justify-center rounded-full text-gray-300 hover:bg-red-50 hover:text-red-400 transition-colors disabled:opacity-40" title="질문 삭제">
                  {deleting ? (<span className="w-3 h-3 border-2 border-red-300 border-t-transparent rounded-full animate-spin inline-block" />) : (<svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>)}
                </button>
              </div>
            </div>
            {title && <h3 className="text-sm font-semibold text-gray-800 mb-3">{title}</h3>}
            {!hasVoted ? (
              <div className="space-y-2.5">
                <button onClick={() => onVote(id, 'A')} className="w-full px-4 py-3.5 rounded-xl border-2 border-blue-300 bg-white text-gray-700 font-medium text-sm hover:bg-blue-50 hover:border-blue-500 hover:text-blue-600 active:bg-blue-100 transition-all duration-200 text-left">
                  <span className="inline-flex items-center gap-2"><span className="w-6 h-6 rounded-full bg-blue-500 text-white text-xs font-bold flex items-center justify-center flex-shrink-0">A</span>{choiceA}</span>
                </button>
                <div className="flex justify-center"><span className="text-xs font-bold text-gray-300">VS</span></div>
                <button onClick={() => onVote(id, 'B')} className="w-full px-4 py-3.5 rounded-xl border-2 border-gray-200 bg-white text-gray-700 font-medium text-sm hover:bg-gray-50 hover:border-gray-400 active:bg-gray-100 transition-all duration-200 text-left">
                  <span className="inline-flex items-center gap-2"><span className="w-6 h-6 rounded-full bg-gray-400 text-white text-xs font-bold flex items-center justify-center flex-shrink-0">B</span>{choiceB}</span>
                </button>
              </div>
            ) : (
              <div className="space-y-2.5">
                <div className={`w-full px-4 py-3 rounded-xl border-2 text-sm font-medium text-left transition-all ${voted === 'A' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-gray-100 bg-gray-50 text-gray-500'}`}>
                  <div className="flex items-center justify-between">
                    <span className="inline-flex items-center gap-2"><span className={`w-6 h-6 rounded-full text-white text-xs font-bold flex items-center justify-center flex-shrink-0 ${voted === 'A' ? 'bg-blue-500' : 'bg-gray-300'}`}>A</span>{choiceA}</span>
                    <span className={`text-sm font-bold ${winnerA ? 'text-blue-600' : 'text-gray-400'}`}>{percentA}%</span>
                  </div>
                </div>
                <div className="flex justify-center"><span className="text-xs font-bold text-gray-300">VS</span></div>
                <div className={`w-full px-4 py-3 rounded-xl border-2 text-sm font-medium text-left transition-all ${voted === 'B' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-gray-100 bg-gray-50 text-gray-500'}`}>
                  <div className="flex items-center justify-between">
                    <span className="inline-flex items-center gap-2"><span className={`w-6 h-6 rounded-full text-white text-xs font-bold flex items-center justify-center flex-shrink-0 ${voted === 'B' ? 'bg-blue-500' : 'bg-gray-300'}`}>B</span>{choiceB}</span>
                    <span className={`text-sm font-bold ${winnerB ? 'text-blue-600' : 'text-gray-400'}`}>{percentB}%</span>
                  </div>
                </div>
                <R4_PercentBar percentA={percentA} percentB={percentB} />
                <p className="text-center text-xs text-gray-400 mt-1">{voted === 'A' ? `"${choiceA}"` : `"${choiceB}"`}에 투표했어요</p>
              </div>
            )}
          </div>
        </R4_Card>
      );
    }

    function R4_RankingSection({ questions }) {
      const ranked = useMemo(() => [...questions].filter(q => q.totalVotes > 0).sort((a, b) => b.totalVotes - a.totalVotes), [questions]);
      if (ranked.length === 0) return null;
      const medals = ['🥇', '🥈', '🥉'];
      return (
        <div className="max-w-lg mx-auto px-4 mt-6 mb-2">
          <h2 className="text-sm font-bold text-gray-700 mb-3 flex items-center gap-1.5"><span>🔥</span> 인기 랭킹</h2>
          <R4_Card>
            <div className="divide-y divide-gray-50">
              {ranked.map((q, i) => {
                const meta = R4_categoryMeta[q.category] || { label: q.category, emoji: '?', color: '' };
                const percentA = Math.round((q.votesA / q.totalVotes) * 100);
                const percentB = 100 - percentA;
                const winner = percentA >= percentB ? q.choiceA : q.choiceB;
                return (
                  <div key={q.id} className="flex items-center gap-3 px-4 py-3">
                    <span className="text-lg flex-shrink-0 w-7 text-center">{medals[i] || `${i + 1}`}</span>
                    <div className="flex-1 min-w-0">
                      <p className="text-sm font-medium text-gray-700 truncate">{q.choiceA} vs {q.choiceB}</p>
                      <p className="text-xs text-gray-400 mt-0.5">우세: <span className="text-blue-500 font-medium">{winner}</span></p>
                    </div>
                    <div className="text-right flex-shrink-0"><p className="text-sm font-bold text-blue-600">{q.totalVotes}</p><p className="text-[10px] text-gray-400">참여</p></div>
                  </div>
                );
              })}
            </div>
          </R4_Card>
        </div>
      );
    }

    function R4_App() {
      const [questions, setQuestions] = useState([]);
      const [votes, setVotes] = useState({});
      const [activeCategory, setActiveCategory] = useState('all');
      const [loading, setLoading] = useState(true);

      useEffect(() => { R4_fetchQuestions().then(res => { if (res.success) setQuestions(res.data); }).finally(() => setLoading(false)); }, []);

      const handleVote = useCallback(async (questionId, choice) => {
        if (votes[questionId]) return;
        setVotes(prev => ({ ...prev, [questionId]: choice }));
        setQuestions(prev => prev.map(q => {
          if (q.id !== questionId) return q;
          return { ...q, votesA: choice === 'A' ? q.votesA + 1 : q.votesA, votesB: choice === 'B' ? q.votesB + 1 : q.votesB, totalVotes: q.totalVotes + 1 };
        }));
        await R4_postVote(questionId, choice);
      }, [votes]);

      const handleCreateQuestion = useCallback(async (data) => { const res = await R4_createQuestion(data); if (res.success) { setQuestions(prev => [res.data, ...prev]); } }, []);
      const handleDeleteQuestion = useCallback(async (id) => { const res = await R4_deleteQuestion(id); if (res.success) { setQuestions(prev => prev.filter(q => q.id !== id)); } }, []);

      const filteredQuestions = useMemo(() => {
        if (activeCategory === 'all') return questions;
        return questions.filter(q => q.category === activeCategory);
      }, [questions, activeCategory]);

      return (
        <div className="min-h-[calc(100vh-56px)] bg-slate-100 pb-8">
          <R4_Header />
          <R4_CategoryTabs active={activeCategory} onChange={setActiveCategory} />
          <R4_CreateQuestionForm onSubmit={handleCreateQuestion} />
          <div className="max-w-lg mx-auto px-4 mt-4 space-y-4">
            {loading ? (
              <div className="flex justify-center py-12"><div className="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin" /></div>
            ) : filteredQuestions.length === 0 ? (
              <R4_Card className="p-8 text-center"><p className="text-3xl mb-2">🤔</p><p className="text-sm text-gray-400">아직 질문이 없어요</p><p className="text-xs text-gray-300 mt-1">첫 번째 질문을 만들어보세요!</p></R4_Card>
            ) : (
              filteredQuestions.map(q => (<R4_QuestionCard key={q.id} question={q} voted={votes[q.id] || null} onVote={handleVote} onDelete={handleDeleteQuestion} />))
            )}
          </div>
          <R4_RankingSection questions={questions} />
          <div className="h-4" />
        </div>
      );
    }

    // ========================================
    // 5. Q5 - Anonymous Board (R5_ prefix)
    // ========================================
    const R5_API_BASE_URL = '/api';

    async function R5_fetchPosts(sort = 'latest') { const res = await fetch(`${R5_API_BASE_URL}/posts?sort=${sort}`); return res.json(); }
    async function R5_createPost(data) { const res = await fetch(`${R5_API_BASE_URL}/posts`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }); return res.json(); }
    async function R5_likePost(id) { const res = await fetch(`${R5_API_BASE_URL}/posts/${id}/like`, { method: 'POST' }); return res.json(); }
    async function R5_deletePost(id) { const res = await fetch(`${R5_API_BASE_URL}/posts/${id}`, { method: 'DELETE' }); return res.json(); }

    const R5_CATEGORIES = [
      { key: 'all', label: '전체', emoji: '' },
      { key: '고민', label: '고민', emoji: '😔' },
      { key: '칭찬', label: '칭찬', emoji: '🌟' },
      { key: '응원', label: '응원', emoji: '💪' },
      { key: '잡담', label: '잡담', emoji: '💬' },
    ];

    const R5_categoryMeta = {
      '고민': { label: '고민', emoji: '😔', color: 'bg-violet-100 text-violet-700' },
      '칭찬': { label: '칭찬', emoji: '🌟', color: 'bg-yellow-100 text-yellow-700' },
      '응원': { label: '응원', emoji: '💪', color: 'bg-green-100 text-green-700' },
      '잡담': { label: '잡담', emoji: '💬', color: 'bg-gray-100 text-gray-600' },
    };

    function R5_Badge({ emoji, label, colorClass, className = '' }) {
      return (<span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium ${colorClass} ${className}`}>{emoji && <span>{emoji}</span>}{label}</span>);
    }
    function R5_Button({ children, variant = 'primary', size = 'md', disabled = false, onClick, className = '', type = 'button' }) {
      const base = 'inline-flex items-center justify-center font-medium transition-all duration-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-violet-300';
      const variants = {
        primary: 'bg-violet-500 text-white hover:bg-violet-600 active:bg-violet-700 disabled:bg-violet-300',
        secondary: 'bg-white text-violet-600 border-2 border-violet-400 hover:bg-violet-50 active:bg-violet-100 disabled:border-violet-200 disabled:text-violet-300',
        ghost: 'bg-transparent text-gray-500 hover:bg-gray-100 active:bg-gray-200 border border-gray-200',
        danger: 'bg-red-500 text-white hover:bg-red-600 active:bg-red-700 disabled:bg-red-300',
      };
      const sizes = { sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2.5 text-sm', lg: 'px-6 py-3 text-base' };
      return (<button type={type} disabled={disabled} onClick={onClick} className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>{children}</button>);
    }
    function R5_Card({ children, className = '' }) {
      return (<div className={`bg-white rounded-2xl shadow-sm border border-gray-100 ${className}`}>{children}</div>);
    }

    function R5_Header() {
      return (
        <header className="bg-violet-500 text-white px-4 py-4 shadow-md">
          <div className="max-w-lg mx-auto flex items-center gap-2"><span className="text-2xl">💜</span><h1 className="text-lg font-bold tracking-tight">익명 게시판</h1></div>
        </header>
      );
    }

    function R5_CategoryTabs({ active, onChange }) {
      const scrollRef = useRef(null);
      return (
        <div className="bg-white border-b border-gray-100">
          <div className="max-w-lg mx-auto">
            <div ref={scrollRef} className="flex gap-1 px-3 py-2 overflow-x-auto hide-scrollbar">
              {R5_CATEGORIES.map(cat => {
                const isActive = active === cat.key;
                return (<button key={cat.key} onClick={() => onChange(cat.key)} className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 ${isActive ? 'bg-violet-500 text-white shadow-sm' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>{cat.emoji && <span className="mr-1">{cat.emoji}</span>}{cat.label}</button>);
              })}
            </div>
          </div>
        </div>
      );
    }

    function R5_SortTabs({ active, onChange }) {
      const tabs = [{ key: 'latest', label: '최신순' }, { key: 'likes', label: '공감순' }];
      return (
        <div className="max-w-lg mx-auto px-4 mt-4">
          <div className="flex gap-1 bg-gray-100 rounded-xl p-1">
            {tabs.map(tab => (<button key={tab.key} onClick={() => onChange(tab.key)} className={`flex-1 py-2 text-sm font-medium rounded-lg transition-all duration-200 ${active === tab.key ? 'bg-white text-violet-600 shadow-sm' : 'text-gray-400 hover:text-gray-600'}`}>{tab.label}</button>))}
          </div>
        </div>
      );
    }

    function R5_CreatePostForm({ onSubmit }) {
      const [isOpen, setIsOpen] = useState(false);
      const [content, setContent] = useState('');
      const [category, setCategory] = useState('고민');
      const catOptions = R5_CATEGORIES.filter(c => c.key !== 'all');

      const resetForm = () => { setContent(''); setCategory('고민'); setIsOpen(false); };

      const handleSubmit = useCallback((e) => {
        e.preventDefault(); if (!content.trim()) return;
        onSubmit({ category, content: content.trim() }); resetForm();
      }, [content, category, onSubmit]);

      return (
        <div className="max-w-lg mx-auto px-4 mt-4">
          <R5_Card>
            <div className="flex items-center gap-2 px-4 py-3">
              <button onClick={() => setIsOpen(!isOpen)} className="flex-1 flex items-center gap-2 text-sm font-semibold text-gray-700 hover:text-violet-600 transition-colors">
                <span className="text-violet-500 text-lg">+</span> 새 글 작성하기
                <svg className={`w-4 h-4 text-gray-400 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
              </button>
            </div>
            {isOpen && (
              <div className="px-5 pb-5 pt-1 slide-down">
                <form onSubmit={handleSubmit}>
                  <div className="space-y-3">
                    <div>
                      <label className="block text-sm font-medium text-gray-600 mb-1.5">카테고리</label>
                      <div className="flex gap-2 flex-wrap">
                        {catOptions.map(cat => {
                          const isActive = category === cat.key;
                          return (<button key={cat.key} type="button" onClick={() => setCategory(cat.key)} className={`px-3 py-1.5 rounded-full text-xs font-medium transition-all duration-200 border-2 ${isActive ? 'border-violet-500 bg-violet-50 text-violet-700' : 'border-gray-200 bg-white text-gray-500 hover:border-gray-300'}`}>{cat.emoji} {cat.label}</button>);
                        })}
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-violet-600 mb-1.5">내용</label>
                      <textarea value={content} onChange={e => setContent(e.target.value)} placeholder="익명으로 자유롭게 작성해보세요..." maxLength={500} rows={4} required className="w-full px-4 py-2.5 rounded-xl border-2 border-violet-200 bg-violet-50/30 focus:bg-white focus:border-violet-400 focus:ring-2 focus:ring-violet-100 outline-none transition-all text-sm resize-none" />
                      <div className="text-right mt-1"><span className="text-xs text-gray-400">{content.length}/500</span></div>
                    </div>
                    <div className="flex gap-2">
                      <R5_Button variant="ghost" size="md" className="flex-1" onClick={resetForm}>취소</R5_Button>
                      <R5_Button type="submit" variant="primary" size="md" className="flex-1" disabled={!content.trim()}>등록하기</R5_Button>
                    </div>
                  </div>
                </form>
              </div>
            )}
          </R5_Card>
        </div>
      );
    }

    function R5_PostCard({ post, liked, onLike, onDelete }) {
      const { id, category, content, likes, created_at } = post;
      const meta = R5_categoryMeta[category] || { label: category, emoji: '?', color: 'bg-gray-100 text-gray-600' };
      const [deleting, setDeleting] = useState(false);

      const handleDelete = async () => { if (!confirm('이 글을 삭제할까요?')) return; setDeleting(true); await onDelete(id); };

      return (
        <R5_Card className="fade-in-up">
          <div className="p-5">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2">
                <R5_Badge emoji={meta.emoji} label={meta.label} colorClass={meta.color} />
                <span className="text-xs text-gray-400 font-medium">익명</span>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-xs text-gray-400">{timeAgo(created_at)}</span>
                <button onClick={handleDelete} disabled={deleting} className="w-6 h-6 flex items-center justify-center rounded-full text-gray-300 hover:bg-red-50 hover:text-red-400 transition-colors disabled:opacity-40" title="글 삭제" aria-label="글 삭제">
                  {deleting ? (<span className="w-3 h-3 border-2 border-red-300 border-t-transparent rounded-full animate-spin inline-block" />) : (<svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>)}
                </button>
              </div>
            </div>
            <p className="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap mb-4">{content}</p>
            <div className="flex items-center">
              <button onClick={() => onLike(id)} className={`inline-flex items-center gap-1.5 px-3.5 py-2 rounded-full text-sm font-medium transition-all duration-200 ${liked ? 'bg-violet-100 text-violet-600 border-2 border-violet-300' : 'bg-gray-50 text-gray-400 border-2 border-gray-100 hover:bg-violet-50 hover:text-violet-500 hover:border-violet-200'}`}>
                <span>💜</span><span>{likes || 0}명 공감</span>
              </button>
            </div>
          </div>
        </R5_Card>
      );
    }

    function R5_PopularSection({ posts }) {
      const ranked = useMemo(() => [...posts].filter(p => (p.likes || 0) > 0).sort((a, b) => (b.likes || 0) - (a.likes || 0)).slice(0, 3), [posts]);
      if (ranked.length === 0) return null;
      const medals = ['🥇', '🥈', '🥉'];
      return (
        <div className="max-w-lg mx-auto px-4 mt-6 mb-2">
          <h2 className="text-sm font-bold text-gray-700 mb-3 flex items-center gap-1.5"><span>🔥</span> 공감 TOP 3</h2>
          <R5_Card>
            <div className="divide-y divide-gray-50">
              {ranked.map((p, i) => {
                const meta = R5_categoryMeta[p.category] || { label: p.category, emoji: '?', color: '' };
                return (
                  <div key={p.id} className="flex items-center gap-3 px-4 py-3">
                    <span className="text-lg flex-shrink-0 w-7 text-center">{medals[i]}</span>
                    <div className="flex-1 min-w-0"><p className="text-sm font-medium text-gray-700 truncate">{p.content}</p><p className="text-xs text-gray-400 mt-0.5">{meta.emoji} {meta.label}</p></div>
                    <div className="text-right flex-shrink-0"><p className="text-sm font-bold text-violet-600">{p.likes || 0}</p><p className="text-[10px] text-gray-400">공감</p></div>
                  </div>
                );
              })}
            </div>
          </R5_Card>
        </div>
      );
    }

    function R5_App() {
      const [posts, setPosts] = useState([]);
      const [likedPosts, setLikedPosts] = useState({});
      const [activeCategory, setActiveCategory] = useState('all');
      const [sortMode, setSortMode] = useState('latest');
      const [loading, setLoading] = useState(true);

      const loadPosts = useCallback(async (sort) => {
        setLoading(true);
        try { const res = await R5_fetchPosts(sort); if (res.success) setPosts(res.data); }
        finally { setLoading(false); }
      }, []);

      useEffect(() => { loadPosts(sortMode); }, [sortMode]);

      const handleLike = useCallback(async (postId) => {
        if (likedPosts[postId]) return;
        setLikedPosts(prev => ({ ...prev, [postId]: true }));
        setPosts(prev => prev.map(p => { if (p.id !== postId) return p; return { ...p, likes: (p.likes || 0) + 1 }; }));
        await R5_likePost(postId);
      }, [likedPosts]);

      const handleCreatePost = useCallback(async (data) => { const res = await R5_createPost(data); if (res.success) { setPosts(prev => [res.data, ...prev]); } }, []);
      const handleDeletePost = useCallback(async (id) => { const res = await R5_deletePost(id); if (res.success) { setPosts(prev => prev.filter(p => p.id !== id)); } }, []);

      const filteredPosts = useMemo(() => {
        if (activeCategory === 'all') return posts;
        return posts.filter(p => p.category === activeCategory);
      }, [posts, activeCategory]);

      return (
        <div className="min-h-[calc(100vh-56px)] bg-slate-100 pb-8">
          <R5_Header />
          <R5_CategoryTabs active={activeCategory} onChange={setActiveCategory} />
          <R5_CreatePostForm onSubmit={handleCreatePost} />
          <R5_SortTabs active={sortMode} onChange={setSortMode} />
          <div className="max-w-lg mx-auto px-4 mt-4 space-y-4">
            {loading ? (
              <div className="flex justify-center py-12"><div className="w-8 h-8 border-4 border-violet-500 border-t-transparent rounded-full animate-spin" /></div>
            ) : filteredPosts.length === 0 ? (
              <R5_Card className="p-8 text-center"><p className="text-3xl mb-2">💜</p><p className="text-sm text-gray-400">아직 글이 없어요</p><p className="text-xs text-gray-300 mt-1">첫 번째 글을 작성해보세요!</p></R5_Card>
            ) : (
              filteredPosts.map(p => (<R5_PostCard key={p.id} post={p} liked={!!likedPosts[p.id]} onLike={handleLike} onDelete={handleDeletePost} />))
            )}
          </div>
          <R5_PopularSection posts={posts} />
          <div className="h-4" />
        </div>
      );
    }

    // ========================================
    // 6. Q6 - Salary Comparison (R6_ prefix)
    // ========================================
    const R6_API_BASE_URL = '/api';

    async function R6_fetchSalaries(sort = 'latest') { const res = await fetch(`${R6_API_BASE_URL}/salaries?sort=${sort}`); return res.json(); }
    async function R6_fetchStats() { const res = await fetch(`${R6_API_BASE_URL}/salaries/stats`); return res.json(); }
    async function R6_createSalary(data) { const res = await fetch(`${R6_API_BASE_URL}/salaries`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }); return res.json(); }
    async function R6_deleteSalary(id) { const res = await fetch(`${R6_API_BASE_URL}/salaries/${id}`, { method: 'DELETE' }); return res.json(); }

      { key: '마케팅', label: '마케팅', emoji: '📣' },

      '마케팅': { label: '마케팅', emoji: '📣', color: 'bg-orange-100 text-orange-700' },

    function R6_Badge({ emoji, label, colorClass, className = '' }) {
      return (<span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium ${colorClass} ${className}`}>{emoji && <span>{emoji}</span>}{label}</span>);

    function R6_Button({ children, variant = 'primary', size = 'md', disabled = false, onClick, className = '', type = 'button' }) {
      const base = 'inline-flex items-center justify-center font-medium transition-all duration-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-300';
      const variants = {
        primary: 'bg-emerald-500 text-white hover:bg-emerald-600 active:bg-emerald-700 disabled:bg-emerald-300',
        secondary: 'bg-white text-emerald-600 border-2 border-emerald-400 hover:bg-emerald-50 active:bg-emerald-100 disabled:border-emerald-200 disabled:text-emerald-300',
        ghost: 'bg-transparent text-gray-500 hover:bg-gray-100 active:bg-gray-200 border border-gray-200',
        danger: 'bg-red-500 text-white hover:bg-red-600 active:bg-red-700 disabled:bg-red-300',
      };
      const sizes = { sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2.5 text-sm', lg: 'px-6 py-3 text-base' };
      return (<button type={type} disabled={disabled} onClick={onClick} className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>{children}</button>);

    function R6_Input({ label, value, onChange, placeholder, className = '', maxLength, type = 'text', min, max }) {

        <div className={className}>

    function R6_Header() {

        <header className="bg-emerald-600 text-white px-4 py-4 shadow-md">
          <div className="max-w-lg mx-auto flex items-center gap-2"><span className="text-2xl">💚</span><h1 className="text-lg font-bold tracking-tight">익명 연봉 비교</h1></div>

    function R6_CategoryTabs({ active, onChange }) {

    function R6_CreateSalaryForm({ onSubmit }) {
      const [isOpen, setIsOpen] = useState(false);
      const [jobCategory, setJobCategory] = useState('개발');
      const [salary, setSalary] = useState('');
      const [monthlyExpense, setMonthlyExpense] = useState('');
      const [comment, setComment] = useState('');

      const catOptions = R6_CATEGORIES.filter(c => c.key !== 'all');
      const resetForm = () => { setJobCategory('개발'); setSalary(''); setMonthlyExpense(''); setComment(''); setIsOpen(false); };
      const isValid = salary !== '' && Number(salary) >= 1 && Number(salary) <= 99999;

      const handleSubmit = useCallback((e) => {
        e.preventDefault(); if (!isValid) return;
        onSubmit({ job_category: jobCategory, salary: Number(salary), monthly_expense: monthlyExpense ? Number(monthlyExpense) : 0, comment: comment.trim() || null });
        resetForm();
      }, [jobCategory, salary, monthlyExpense, comment, isValid, onSubmit]);

      return (
        <div className="max-w-lg mx-auto px-4 mt-4">
          <R6_Card>
            <div className="flex items-center gap-2 px-4 py-3">
              <button onClick={() => setIsOpen(!isOpen)} className="flex-1 flex items-center gap-2 text-sm font-semibold text-gray-700 hover:text-emerald-600 transition-colors">
                <span className="text-emerald-500 text-lg">+</span> 내 연봉 등록하기
                <svg className={`w-4 h-4 text-gray-400 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
              </button>
            </div>
            {isOpen && (
              <div className="px-5 pb-5 pt-1 slide-down">
                <form onSubmit={handleSubmit}>
                  <div className="space-y-3">
                    <div>
                      <label className="block text-sm font-medium text-gray-600 mb-1.5">직군</label>
                      <div className="flex gap-2 flex-wrap">
                        {catOptions.map(cat => {
                          const isActive = jobCategory === cat.key;
                          return (<button key={cat.key} type="button" onClick={() => setJobCategory(cat.key)} className={`px-3 py-1.5 rounded-full text-xs font-medium transition-all duration-200 border-2 ${isActive ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-gray-200 bg-white text-gray-500 hover:border-gray-300'}`}>{cat.emoji} {cat.label}</button>);
                        })}
                      </div>
                    </div>
                    <R6_Input label="연봉 (만원) *" type="number" value={salary} onChange={e => setSalary(e.target.value)} placeholder="예: 5000" min={1} max={99999} />
                    <R6_Input label="월 지출 (만원)" type="number" value={monthlyExpense} onChange={e => setMonthlyExpense(e.target.value)} placeholder="예: 150" min={0} max={99999} />
                    <div>
                      <label className="block text-sm font-medium text-gray-600 mb-1.5">한마디 (선택)</label>
                      <input type="text" value={comment} onChange={e => setComment(e.target.value)} placeholder="한마디를 남겨보세요..." maxLength={100} className="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 outline-none transition-all text-sm" />
                      <div className="text-right mt-1"><span className="text-xs text-gray-400">{comment.length}/100</span></div>
                    </div>
                    <div className="flex gap-2">
                      <R6_Button variant="ghost" size="md" className="flex-1" onClick={resetForm}>취소</R6_Button>
                      <R6_Button type="submit" variant="primary" size="md" className="flex-1" disabled={!isValid}>등록하기</R6_Button>
                    </div>
                  </div>
                </form>
              </div>
            )}
          </R6_Card>
        </div>
      );
    }

    function R6_SalaryCard({ item, avgSalary, onDelete }) {
      const { id, job_category, salary, monthly_expense, comment, created_at } = item;
      const meta = R6_categoryMeta[job_category] || { label: job_category, emoji: '?', color: 'bg-gray-100 text-gray-600' };
      const [deleting, setDeleting] = useState(false);

      const diff = avgSalary ? salary - avgSalary : 0;
      const diffText = diff >= 0 ? `평균보다 +${formatMoney(diff)}만원 높아요` : `평균보다 -${formatMoney(Math.abs(diff))}만원 낮아요`;
      const diffColor = diff >= 0 ? 'text-emerald-600' : 'text-red-500';

      const handleDelete = async () => { if (!confirm('이 항목을 삭제할까요?')) return; setDeleting(true); await onDelete(id); };

      return (
        <R6_Card className="fade-in-up">
          <div className="p-5">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2">
                <R6_Badge emoji={meta.emoji} label={meta.label} colorClass={meta.color} />
                <span className="text-xs text-gray-400">{timeAgo(created_at)}</span>
              </div>
              <button onClick={handleDelete} disabled={deleting} className="w-6 h-6 flex items-center justify-center rounded-full text-gray-300 hover:bg-red-50 hover:text-red-400 transition-colors disabled:opacity-40" title="삭제" aria-label="삭제">
                {deleting ? (<span className="w-3 h-3 border-2 border-red-300 border-t-transparent rounded-full animate-spin inline-block" />) : (<svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>)}
              </button>
            </div>
            <p className="text-2xl font-bold text-gray-800 mb-1">{formatMoney(salary)} <span className="text-base font-medium text-gray-500">만원</span></p>

            {avgSalary > 0 && (<p className={`text-xs font-medium mt-2 ${diffColor}`}>{diffText}</p>)}
            {comment && (<div className="mt-3 px-3 py-2 bg-gray-50 rounded-xl border border-gray-100"><p className="text-sm text-gray-600 italic">"{comment}"</p></div>)}
          </div>
        </R6_Card>
      );

    function R6_TopSalarySection({ salaries }) {
      const ranked = useMemo(() => [...salaries].sort((a, b) => b.salary - a.salary).slice(0, 3), [salaries]);
      if (ranked.length === 0) return null;
      const medals = ['🥇', '🥈', '🥉'];
      return (
        <div className="max-w-lg mx-auto px-4 mt-6 mb-2">
          <h2 className="text-sm font-bold text-gray-700 mb-3 flex items-center gap-1.5"><span>🔥</span> 연봉 TOP 3</h2>

                return (
                  <div key={s.id} className="flex items-center gap-3 px-4 py-3">

                  </div>
                );
              })}
            </div>
          </R6_Card>
        </div>
      );
    }

    function R6_App() {
      const [salaries, setSalaries] = useState([]);
      const [stats, setStats] = useState(null);
      const [activeCategory, setActiveCategory] = useState('all');
      const [sortBy, setSortBy] = useState('latest');
      const [loading, setLoading] = useState(true);

      const loadData = useCallback(async () => {
        setLoading(true);
        try {
          const [salRes, statRes] = await Promise.all([R6_fetchSalaries(sortBy), R6_fetchStats()]);
          if (salRes.success) setSalaries(salRes.data);
          if (statRes.success) setStats(statRes.data);
        } finally { setLoading(false); }
      }, [sortBy]);

      useEffect(() => { loadData(); }, [loadData]);

      const handleCreate = useCallback(async (data) => {
        const res = await R6_createSalary(data);
        if (res.success) { setSalaries(prev => [res.data, ...prev]); const statRes = await R6_fetchStats(); if (statRes.success) setStats(statRes.data); }
      }, []);

      const handleDelete = useCallback(async (id) => {
        const res = await R6_deleteSalary(id);
        if (res.success) { setSalaries(prev => prev.filter(s => s.id !== id)); const statRes = await R6_fetchStats(); if (statRes.success) setStats(statRes.data); }
      }, []);

      const filteredSalaries = useMemo(() => {
        let list = salaries;
        if (activeCategory !== 'all') { list = list.filter(s => s.job_category === activeCategory); }
        if (sortBy === 'salary') { list = [...list].sort((a, b) => b.salary - a.salary); }
        return list;
      }, [salaries, activeCategory, sortBy]);

      const avgSalary = stats ? stats.avgSalary : 0;

      return (
        <div className="min-h-[calc(100vh-56px)] bg-slate-100 pb-8">
          <R6_Header />
          <R6_CategoryTabs active={activeCategory} onChange={setActiveCategory} />
          <R6_StatsBar stats={stats} loading={loading} />
          <R6_CreateSalaryForm onSubmit={handleCreate} />
          <R6_SortTabs active={sortBy} onChange={setSortBy} />
          <div className="max-w-lg mx-auto px-4 mt-4 space-y-4">
            {loading ? (
              <div className="flex justify-center py-12"><div className="w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin" /></div>
            ) : filteredSalaries.length === 0 ? (
              <R6_Card className="p-8 text-center"><p className="text-3xl mb-2">💚</p><p className="text-sm text-gray-400">아직 등록된 연봉이 없어요</p><p className="text-xs text-gray-300 mt-1">첫 번째로 연봉을 등록해보세요!</p></R6_Card>
            ) : (
              filteredSalaries.map(s => (<R6_SalaryCard key={s.id} item={s} avgSalary={avgSalary} onDelete={handleDelete} />))
            )}
          </div>
          <R6_TopSalarySection salaries={salaries} />
          <div className="h-4" />
        </div>
      );
    }

    // ========================================
    // 7. TabNav Component
    // ========================================
    const TAB_CONFIG = [
      { key: 'q3', label: '🍳 AI 레시피', color: 'amber' },
      { key: 'q4', label: '⚖️ 밸런스 게임', color: 'blue' },
      { key: 'q5', label: '💜 익명 게시판', color: 'violet' },
      { key: 'q6', label: '💚 연봉 비교', color: 'emerald' },
    ];

    const TAB_ACTIVE_STYLES = {
      q3: 'border-b-2 border-amber-400 text-amber-400',
      q4: 'border-b-2 border-blue-400 text-blue-400',
      q5: 'border-b-2 border-violet-400 text-violet-400',
      q6: 'border-b-2 border-emerald-400 text-emerald-400',
    };

    function TabNav({ activeTab, onChange }) {
      return (
        <nav className="bg-gray-900 sticky top-0 z-[100] shadow-lg">
          <div className="flex">
            {TAB_CONFIG.map(tab => {
              const isActive = activeTab === tab.key;
              return (
                <button
                  key={tab.key}
                  onClick={() => onChange(tab.key)}
                  className={`flex-1 py-3.5 text-sm font-semibold transition-all duration-200 ${
                    isActive
                      ? TAB_ACTIVE_STYLES[tab.key]
                      : 'text-gray-400 hover:text-gray-200 border-b-2 border-transparent'
                  }`}
                >
                  {tab.label}
                </button>
              );
            })}
          </div>
        </nav>
      );
    }

    // ========================================
    // 8. App Root Component
    // ========================================
    function App() {
      const [activeTab, setActiveTab] = useState('q3');

      return (
        <div className="min-h-screen bg-slate-100">
          <TabNav activeTab={activeTab} onChange={setActiveTab} />
          {activeTab === 'q3' && <R3_App />}
          {activeTab === 'q4' && <R4_App />}
          {activeTab === 'q5' && <R5_App />}
          {activeTab === 'q6' && <R6_App />}
        </div>
      );
    }

    // ========================================
    // 9. Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
