<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Tester</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            editor: {
              bg: '#1e1e1e',
              sidebar: '#252526',
              panel: '#2d2d2d',
              border: '#3e3e3e',
              hover: '#3a3a3a',
              active: '#37373d',
              text: '#cccccc',
              muted: '#808080',
              accent: '#007acc',
            }
          }
        }
      }
    };
  </script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', -apple-system, sans-serif; background: #1e1e1e; color: #cccccc; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1e1e1e; }
    ::-webkit-scrollbar-thumb { background: #424242; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
    textarea, input, select { outline: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
    .json-key { color: #9cdcfe; }
    .json-string { color: #ce9178; }
    .json-number { color: #b5cea8; }
    .json-bool { color: #569cd6; }
    .json-null { color: #569cd6; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ========================================
    // Utilities
    // ========================================
    const METHOD_COLORS = {
      GET: 'text-green-400',
      POST: 'text-yellow-400',
      PUT: 'text-blue-400',
      DELETE: 'text-red-400',
      PATCH: 'text-purple-400',
    };

    const METHOD_BG = {
      GET: 'bg-green-600',
      POST: 'bg-yellow-600',
      PUT: 'bg-blue-600',
      DELETE: 'bg-red-600',
      PATCH: 'bg-purple-600',
    };

    function getStatusColor(code) {
      if (code >= 200 && code < 300) return 'text-green-400';
      if (code >= 300 && code < 400) return 'text-blue-400';
      if (code >= 400 && code < 500) return 'text-orange-400';
      if (code >= 500) return 'text-red-400';
      return 'text-editor-muted';
    }

    function getStatusBg(code) {
      if (code >= 200 && code < 300) return 'bg-green-900/30 border-green-700';
      if (code >= 300 && code < 400) return 'bg-blue-900/30 border-blue-700';
      if (code >= 400 && code < 500) return 'bg-orange-900/30 border-orange-700';
      if (code >= 500) return 'bg-red-900/30 border-red-700';
      return '';
    }

    function syntaxHighlight(json) {
      if (typeof json !== 'string') json = JSON.stringify(json, null, 2);
      json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return json.replace(
        /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
        (match) => {
          let cls = 'json-number';
          if (/^"/.test(match)) {
            cls = /:$/.test(match) ? 'json-key' : 'json-string';
          } else if (/true|false/.test(match)) {
            cls = 'json-bool';
          } else if (/null/.test(match)) {
            cls = 'json-null';
          }
          return `<span class="${cls}">${match}</span>`;
        }
      );
    }

    function formatBody(body) {
      try {
        const parsed = JSON.parse(body);
        return syntaxHighlight(JSON.stringify(parsed, null, 2));
      } catch {
        return body || '';
      }
    }

    // ========================================
    // Design System Components
    // ========================================
    function Button({ children, variant = 'primary', size = 'md', disabled, onClick, className = '', ...rest }) {
      const base = 'font-medium rounded transition-colors focus:outline-none focus:ring-2 focus:ring-editor-accent inline-flex items-center justify-center gap-1.5';
      const variants = {
        primary: 'bg-editor-accent hover:bg-blue-600 text-white',
        secondary: 'bg-editor-panel hover:bg-editor-hover text-editor-text border border-editor-border',
        danger: 'bg-red-700 hover:bg-red-600 text-white',
        ghost: 'bg-transparent hover:bg-editor-hover text-editor-text',
      };
      const sizes = { sm: 'px-2 py-1 text-xs', md: 'px-3 py-1.5 text-sm', lg: 'px-5 py-2.5 text-base' };
      return (
        <button
          className={`${base} ${variants[variant]} ${sizes[size]} ${disabled ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'} ${className}`}
          disabled={disabled}
          onClick={onClick}
          {...rest}
        >
          {children}
        </button>
      );
    }

    function Input({ label, error, className = '', ...props }) {
      return (
        <div className={className}>
          {label && <label className="block text-xs text-editor-muted mb-1">{label}</label>}
          <input
            className={`w-full bg-editor-bg border ${error ? 'border-red-500' : 'border-editor-border'} text-editor-text rounded px-3 py-1.5 text-sm focus:border-editor-accent transition-colors`}
            {...props}
          />
          {error && <p className="text-red-400 text-xs mt-1">{error}</p>}
        </div>
      );
    }

    function Select({ label, options, className = '', ...props }) {
      return (
        <div className={className}>
          {label && <label className="block text-xs text-editor-muted mb-1">{label}</label>}
          <select
            className="w-full bg-editor-bg border border-editor-border text-editor-text rounded px-3 py-1.5 text-sm focus:border-editor-accent transition-colors cursor-pointer"
            {...props}
          >
            {options.map((o) => (
              <option key={o.value} value={o.value}>{o.label}</option>
            ))}
          </select>
        </div>
      );
    }

    function Tabs({ tabs, active, onChange }) {
      return (
        <div className="flex border-b border-editor-border">
          {tabs.map((t) => (
            <button
              key={t.key}
              onClick={() => onChange(t.key)}
              className={`px-4 py-2 text-sm transition-colors relative ${
                active === t.key
                  ? 'text-white'
                  : 'text-editor-muted hover:text-editor-text'
              }`}
            >
              {t.label}
              {active === t.key && (
                <span className="absolute bottom-0 left-0 right-0 h-0.5 bg-editor-accent" />
              )}
            </button>
          ))}
        </div>
      );
    }

    function Spinner() {
      return (
        <div className="flex items-center justify-center py-12">
          <div className="w-8 h-8 border-2 border-editor-border border-t-editor-accent rounded-full spinner" />
        </div>
      );
    }

    // ========================================
    // Key-Value Editor (for Headers)
    // ========================================
    function KeyValueEditor({ pairs, onChange }) {
      const addPair = () => onChange([...pairs, { key: '', value: '' }]);
      const removePair = (i) => onChange(pairs.filter((_, idx) => idx !== i));
      const updatePair = (i, field, val) => {
        const next = pairs.map((p, idx) => idx === i ? { ...p, [field]: val } : p);
        onChange(next);
      };

      return (
        <div className="space-y-2">
          {pairs.map((p, i) => (
            <div key={i} className="flex gap-2 items-center">
              <input
                className="flex-1 bg-editor-bg border border-editor-border text-editor-text rounded px-2 py-1 text-sm focus:border-editor-accent"
                placeholder="Key"
                value={p.key}
                onChange={(e) => updatePair(i, 'key', e.target.value)}
              />
              <input
                className="flex-1 bg-editor-bg border border-editor-border text-editor-text rounded px-2 py-1 text-sm focus:border-editor-accent"
                placeholder="Value"
                value={p.value}
                onChange={(e) => updatePair(i, 'value', e.target.value)}
              />
              <button
                onClick={() => removePair(i)}
                className="text-editor-muted hover:text-red-400 transition-colors text-lg leading-none px-1"
                aria-label="헤더 삭제"
              >
                &times;
              </button>
            </div>
          ))}
          <Button variant="ghost" size="sm" onClick={addPair}>+ 헤더 추가</Button>
        </div>
      );
    }

    // ========================================
    // Request Panel
    // ========================================
    function RequestPanel({ request, setRequest, onSend, loading }) {
      const [reqTab, setReqTab] = useState('headers');
      const hasBody = ['POST', 'PUT', 'PATCH'].includes(request.method);

      const reqTabs = [
        { key: 'headers', label: `Headers (${request.headers.filter(h => h.key).length})` },
        ...(hasBody ? [{ key: 'body', label: 'Body' }] : []),
      ];

      return (
        <div className="flex flex-col h-full">
          {/* Method + URL bar */}
          <div className="flex gap-2 p-4 pb-2">
            <select
              value={request.method}
              onChange={(e) => setRequest({ ...request, method: e.target.value })}
              className={`bg-editor-bg border border-editor-border rounded px-3 py-1.5 text-sm font-bold focus:border-editor-accent cursor-pointer ${METHOD_COLORS[request.method]}`}
            >
              {['GET', 'POST', 'PUT', 'DELETE', 'PATCH'].map((m) => (
                <option key={m} value={m}>{m}</option>
              ))}
            </select>
            <input
              className="flex-1 bg-editor-bg border border-editor-border text-editor-text rounded px-3 py-1.5 text-sm focus:border-editor-accent"
              placeholder="/api/hello"
              value={request.url}
              onChange={(e) => setRequest({ ...request, url: e.target.value })}
              onKeyDown={(e) => e.key === 'Enter' && !loading && onSend()}
            />
            <Button onClick={onSend} disabled={loading || !request.url} size="md">
              {loading ? (
                <span className="flex items-center gap-1.5">
                  <span className="w-3.5 h-3.5 border-2 border-white/30 border-t-white rounded-full spinner" />
                  전송 중...
                </span>
              ) : '전송'}
            </Button>
          </div>

          {/* Tabs */}
          <div className="px-4">
            <Tabs tabs={reqTabs} active={reqTab} onChange={setReqTab} />
          </div>

          {/* Tab Content */}
          <div className="flex-1 overflow-auto p-4">
            {reqTab === 'headers' && (
              <KeyValueEditor
                pairs={request.headers}
                onChange={(headers) => setRequest({ ...request, headers })}
              />
            )}
            {reqTab === 'body' && hasBody && (
              <textarea
                className="w-full h-full min-h-[200px] bg-editor-bg border border-editor-border text-editor-text rounded p-3 text-sm font-mono resize-none focus:border-editor-accent"
                placeholder='{ "key": "value" }'
                value={request.body}
                onChange={(e) => setRequest({ ...request, body: e.target.value })}
              />
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // Response Panel
    // ========================================
    function ResponsePanel({ response, loading, error }) {
      const [resTab, setResTab] = useState('body');

      if (loading) return <Spinner />;

      if (error) {
        return (
          <div className="p-4">
            <div className="bg-red-900/20 border border-red-700 rounded p-4">
              <p className="text-red-400 font-medium text-sm mb-1">Error</p>
              <p className="text-red-300 text-sm">{error}</p>
            </div>
          </div>
        );
      }

      if (!response) {
        return (
          <div className="flex items-center justify-center h-full text-editor-muted">
            <div className="text-center">
              <div className="text-4xl mb-3 opacity-30">&#8644;</div>
              <p className="text-sm">요청을 전송하면 응답이 여기에 표시됩니다</p>
            </div>
          </div>
        );
      }

      const resTabs = [
        { key: 'body', label: 'Body' },
        { key: 'headers', label: `Headers (${Object.keys(response.headers || {}).length})` },
      ];

      return (
        <div className="flex flex-col h-full">
          {/* Status bar */}
          <div className="flex items-center gap-3 p-4 pb-2 flex-wrap">
            <span className={`text-sm font-bold px-2.5 py-1 rounded border ${getStatusBg(response.status)} ${getStatusColor(response.status)}`}>
              {response.status} {response.statusText}
            </span>
            <span className="text-xs text-editor-muted">
              {response.time}ms
            </span>
            <span className="text-xs text-editor-muted">
              {response.size ? `${(response.size / 1024).toFixed(1)} KB` : ''}
            </span>
          </div>

          <div className="px-4">
            <Tabs tabs={resTabs} active={resTab} onChange={setResTab} />
          </div>

          <div className="flex-1 overflow-auto p-4">
            {resTab === 'body' && (
              <pre
                className="text-sm font-mono whitespace-pre-wrap break-all leading-relaxed"
                dangerouslySetInnerHTML={{ __html: formatBody(response.body) }}
              />
            )}
            {resTab === 'headers' && (
              <div className="space-y-1">
                {Object.entries(response.headers || {}).map(([k, v]) => (
                  <div key={k} className="flex gap-2 text-sm font-mono">
                    <span className="text-purple-400 shrink-0">{k}:</span>
                    <span className="text-editor-text break-all">{v}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // History Sidebar
    // ========================================
    function HistorySidebar({ history, onSelect, activeIndex }) {
      if (history.length === 0) {
        return (
          <div className="p-3 text-center text-editor-muted text-xs">
            아직 요청 기록이 없습니다
          </div>
        );
      }

      return (
        <div className="flex flex-col">
          {history.map((item, i) => (
            <button
              key={i}
              onClick={() => onSelect(i)}
              className={`text-left px-3 py-2.5 border-b border-editor-border transition-colors ${
                activeIndex === i ? 'bg-editor-active' : 'hover:bg-editor-hover'
              }`}
            >
              <div className="flex items-center gap-2 mb-1">
                <span className={`text-xs font-bold ${METHOD_COLORS[item.request.method]}`}>
                  {item.request.method}
                </span>
                {item.response && (
                  <span className={`text-xs ${getStatusColor(item.response.status)}`}>
                    {item.response.status}
                  </span>
                )}
                {item.error && <span className="text-xs text-red-400">ERR</span>}
              </div>
              <div className="text-xs text-editor-text truncate">{item.request.url}</div>
              <div className="text-xs text-editor-muted mt-0.5">
                {item.response ? `${item.response.time}ms` : ''} {item.timestamp}
              </div>
            </button>
          ))}
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      const defaultRequest = {
        method: 'GET',
        url: '/api/hello',
        headers: [{ key: 'Content-Type', value: 'application/json' }],
        body: '',
      };

      const [request, setRequest] = useState({ ...defaultRequest });
      const [response, setResponse] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [history, setHistory] = useState([]);
      const [activeHistoryIndex, setActiveHistoryIndex] = useState(-1);
      const [sidebarOpen, setSidebarOpen] = useState(true);

      const sendRequest = useCallback(async () => {
        setLoading(true);
        setError(null);
        setResponse(null);

        const headers = {};
        request.headers.forEach((h) => {
          if (h.key.trim()) headers[h.key.trim()] = h.value;
        });

        const hasBody = ['POST', 'PUT', 'PATCH'].includes(request.method);
        const opts = {
          method: request.method,
          headers,
        };
        if (hasBody && request.body.trim()) {
          opts.body = request.body;
        }

        const url = request.url.startsWith('http')
          ? request.url
          : `${window.location.origin}${request.url.startsWith('/') ? '' : '/'}${request.url}`;

        const start = performance.now();
        const timestamp = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        try {
          const res = await fetch(url, opts);
          const elapsed = Math.round(performance.now() - start);

          const resHeaders = {};
          res.headers.forEach((v, k) => { resHeaders[k] = v; });

          const bodyText = await res.text();

          const resData = {
            status: res.status,
            statusText: res.statusText,
            headers: resHeaders,
            body: bodyText,
            time: elapsed,
            size: new Blob([bodyText]).size,
          };

          setResponse(resData);

          setHistory((prev) => {
            const entry = { request: { ...request }, response: resData, timestamp };
            return [entry, ...prev].slice(0, 10);
          });
          setActiveHistoryIndex(-1);
        } catch (err) {
          const elapsed = Math.round(performance.now() - start);
          const errMsg = err.message || '알 수 없는 네트워크 오류';
          setError(errMsg);
          setHistory((prev) => {
            const entry = { request: { ...request }, error: errMsg, timestamp };
            return [entry, ...prev].slice(0, 10);
          });
          setActiveHistoryIndex(-1);
        } finally {
          setLoading(false);
        }
      }, [request]);

      const restoreFromHistory = useCallback((index) => {
        const item = history[index];
        if (!item) return;
        setRequest({ ...item.request });
        setResponse(item.response || null);
        setError(item.error || null);
        setActiveHistoryIndex(index);
      }, [history]);

      return (
        <div className="h-screen flex flex-col bg-editor-bg">
          {/* Title bar */}
          <header className="bg-editor-sidebar border-b border-editor-border px-4 py-2 flex items-center justify-between shrink-0">
            <div className="flex items-center gap-3">
              <h1 className="text-sm font-semibold text-editor-text tracking-wide">API Tester</h1>
              <span className="text-xs text-editor-muted hidden sm:inline">
                {window.location.origin}
              </span>
            </div>
            <button
              onClick={() => setSidebarOpen(!sidebarOpen)}
              className="text-editor-muted hover:text-editor-text text-sm transition-colors px-2 py-1"
              aria-label="히스토리 토글"
            >
              {sidebarOpen ? 'History <<' : '>> History'}
            </button>
          </header>

          <div className="flex-1 flex overflow-hidden">
            {/* History sidebar */}
            {sidebarOpen && (
              <aside className="w-64 shrink-0 bg-editor-sidebar border-r border-editor-border overflow-y-auto hidden md:block">
                <div className="px-3 py-2 text-xs font-semibold text-editor-muted uppercase tracking-wider border-b border-editor-border">
                  History
                </div>
                <HistorySidebar
                  history={history}
                  onSelect={restoreFromHistory}
                  activeIndex={activeHistoryIndex}
                />
              </aside>
            )}

            {/* Main content area */}
            <div className="flex-1 flex flex-col lg:flex-row overflow-hidden">
              {/* Request panel */}
              <div className="flex-1 border-b lg:border-b-0 lg:border-r border-editor-border overflow-hidden flex flex-col min-h-0">
                <div className="px-4 py-2 text-xs font-semibold text-editor-muted uppercase tracking-wider border-b border-editor-border bg-editor-panel shrink-0">
                  Request
                </div>
                <div className="flex-1 overflow-auto">
                  <RequestPanel
                    request={request}
                    setRequest={setRequest}
                    onSend={sendRequest}
                    loading={loading}
                  />
                </div>
              </div>

              {/* Response panel */}
              <div className="flex-1 overflow-hidden flex flex-col min-h-0">
                <div className="px-4 py-2 text-xs font-semibold text-editor-muted uppercase tracking-wider border-b border-editor-border bg-editor-panel shrink-0">
                  Response
                </div>
                <div className="flex-1 overflow-auto">
                  <ResponsePanel response={response} loading={loading} error={error} />
                </div>
              </div>
            </div>
          </div>

          {/* Mobile history drawer */}
          {sidebarOpen && (
            <div className="md:hidden border-t border-editor-border bg-editor-sidebar max-h-48 overflow-y-auto">
              <div className="px-3 py-2 text-xs font-semibold text-editor-muted uppercase tracking-wider border-b border-editor-border">
                History
              </div>
              <HistorySidebar
                history={history}
                onSelect={restoreFromHistory}
                activeIndex={activeHistoryIndex}
              />
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
