<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 별명 생성기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    @keyframes bounce-in {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    .bounce-in { animation: bounce-in 0.5s ease forwards; }
    .card-delay-1 { animation-delay: 0.1s; opacity: 0; }
    .card-delay-2 { animation-delay: 0.3s; opacity: 0; }
    .card-delay-3 { animation-delay: 0.5s; opacity: 0; }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner { animation: spin 1s linear infinite; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-400 via-pink-300 to-yellow-200">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Input({ label, value, onChange, placeholder }) {
      return (
        <div className="mb-4">
          <label className="block text-purple-800 font-bold mb-1 text-sm">{label}</label>
          <input
            type="text"
            value={value}
            onChange={e => onChange(e.target.value)}
            placeholder={placeholder}
            className="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-purple-500 focus:outline-none bg-white/80 backdrop-blur text-gray-700 placeholder-gray-400 transition"
          />
        </div>
      );
    }

    function Button({ onClick, disabled, children }) {
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`w-full py-3 px-6 rounded-xl font-bold text-white text-lg transition transform
            ${disabled
              ? 'bg-gray-300 cursor-not-allowed'
              : 'bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 hover:scale-105 active:scale-95 shadow-lg'
            }`}
        >
          {children}
        </button>
      );
    }

    const BADGE_COLORS = [
      { bg: 'from-purple-400 to-indigo-500', emoji: '👑' },
      { bg: 'from-pink-400 to-rose-500', emoji: '🌟' },
      { bg: 'from-yellow-400 to-orange-500', emoji: '🔥' },
    ];

    function NicknameCard({ nickname, index }) {
      const [copied, setCopied] = useState(false);
      const color = BADGE_COLORS[index % BADGE_COLORS.length];
      const delay = `card-delay-${index + 1}`;

      const handleCopy = useCallback(() => {
        navigator.clipboard.writeText(nickname).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        });
      }, [nickname]);

      return (
        <div
          onClick={handleCopy}
          className={`bounce-in ${delay} bg-white/90 backdrop-blur rounded-2xl p-5 shadow-xl flex items-center gap-4 cursor-pointer transition hover:scale-105 hover:shadow-2xl active:scale-95 select-none`}
          title="클릭하면 복사됩니다"
        >
          <div className={`w-14 h-14 rounded-full bg-gradient-to-br ${color.bg} flex items-center justify-center text-2xl shadow-md flex-shrink-0`}>
            {color.emoji}
          </div>
          <div className="flex-1">
            <p className="text-xs text-gray-400 font-semibold">별명 #{index + 1}</p>
            <p className="text-xl font-black text-gray-800">{nickname}</p>
          </div>
          <div className={`text-sm font-bold transition-all duration-200 ${copied ? 'text-green-500' : 'text-gray-300'}`}>
            {copied ? '✅ 복사됨!' : '📋'}
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 App Component
    // ========================================

    function App() {
      const [name, setName] = useState('');
      const [personality, setPersonality] = useState('');
      const [hobbies, setHobbies] = useState('');
      const [nicknames, setNicknames] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      async function handleGenerate() {
        if (!name.trim() || !personality.trim() || !hobbies.trim()) {
          setError('이름, 성격, 취미를 모두 입력해주세요!');
          return;
        }
        setError('');
        setNicknames([]);
        setLoading(true);
        try {
          const res = await fetch('/api/nickname', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, personality, hobbies }),
          });
          if (!res.ok) throw new Error('서버 오류가 발생했어요.');
          const data = await res.json();
          setNicknames(data.nicknames || []);
        } catch (e) {
          setError(e.message || '오류가 발생했어요. 다시 시도해주세요.');
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-6">
          {/* Header */}
          <div className="text-center mb-6">
            <div className="text-5xl mb-2">🎭</div>
            <h1 className="text-3xl font-black text-white drop-shadow-lg">AI 별명 생성기</h1>
            <p className="text-white/80 mt-1">나만의 특별한 별명을 AI가 만들어드려요!</p>
          </div>

          {/* Two-column layout */}
          <div className="w-full max-w-3xl flex flex-col md:flex-row gap-6 items-start">
            {/* Left: Form */}
            <div className="w-full md:w-1/2 bg-white/70 backdrop-blur-md rounded-3xl p-6 shadow-2xl">
              <Input label="🧑 이름" value={name} onChange={setName} placeholder="예: 김민준" />
              <Input label="💬 성격" value={personality} onChange={setPersonality} placeholder="예: 활발하고 유머러스함" />
              <Input label="🎯 취미" value={hobbies} onChange={setHobbies} placeholder="예: 게임, 요리, 등산" />

              {error && (
                <p className="text-red-500 text-sm font-semibold mb-3 text-center">{error}</p>
              )}

              <Button onClick={handleGenerate} disabled={loading}>
                {loading ? (
                  <span className="flex items-center justify-center gap-2">
                    <svg className="spinner w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                    </svg>
                    별명 생성 중...
                  </span>
                ) : '✨ 별명 만들기'}
              </Button>
            </div>

            {/* Right: Results */}
            <div className="w-full md:w-1/2">
              {nicknames.length > 0 ? (
                <div className="space-y-3">
                  <p className="text-center text-white font-bold text-lg drop-shadow">🎉 클릭하면 복사돼요!</p>
                  {nicknames.map((nickname, i) => (
                    <NicknameCard key={i} nickname={nickname} index={i} />
                  ))}
                </div>
              ) : (
                <div className="bg-white/30 backdrop-blur rounded-3xl p-8 text-center text-white/70 h-full flex flex-col items-center justify-center gap-3 min-h-48">
                  <div className="text-5xl">✨</div>
                  <p className="font-bold">별명이 여기에 나타나요</p>
                  <p className="text-sm">왼쪽에서 정보를 입력하고<br/>버튼을 눌러보세요!</p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
