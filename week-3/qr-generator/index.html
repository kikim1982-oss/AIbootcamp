<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR 코드 생성기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    #qrcode-canvas img, #qrcode-canvas canvas { margin: 0 auto; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useRef, useEffect, useCallback } = React;

    // ========================================
    // Design System Components
    // ========================================

    function Button({ children, onClick, variant = "primary", size = "md", disabled = false, className = "" }) {
      const base = "inline-flex items-center justify-center font-medium rounded-xl transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed";
      const variants = {
        primary: "bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-500 shadow-lg shadow-indigo-200 hover:shadow-xl hover:shadow-indigo-300",
        secondary: "bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 focus:ring-indigo-500",
        success: "bg-emerald-600 text-white hover:bg-emerald-700 focus:ring-emerald-500 shadow-lg shadow-emerald-200 hover:shadow-xl hover:shadow-emerald-300",
      };
      const sizes = {
        sm: "px-3 py-1.5 text-sm",
        md: "px-5 py-2.5 text-base",
        lg: "px-7 py-3.5 text-lg",
      };
      return (
        <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>
          {children}
        </button>
      );
    }

    function Input({ label, value, onChange, placeholder, error, type = "text", className = "" }) {
      return (
        <div className={`w-full ${className}`}>
          {label && <label className="block text-sm font-medium text-gray-700 mb-1.5">{label}</label>}
          <input
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            className={`w-full px-4 py-3 rounded-xl border ${error ? "border-red-400 focus:ring-red-500" : "border-gray-300 focus:ring-indigo-500"} focus:outline-none focus:ring-2 focus:border-transparent transition-all duration-200 text-gray-800 placeholder-gray-400 bg-white`}
          />
          {error && <p className="mt-1.5 text-sm text-red-500">{error}</p>}
        </div>
      );
    }

    function Card({ children, className = "" }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sm:p-8 ${className}`}>
          {children}
        </div>
      );
    }

    function ColorPicker({ label, value, onChange }) {
      return (
        <div className="flex flex-col items-center gap-2">
          <label className="text-sm font-medium text-gray-600">{label}</label>
          <div className="relative">
            <input
              type="color"
              value={value}
              onChange={onChange}
              className="w-12 h-12 rounded-xl cursor-pointer border-2 border-gray-200 hover:border-indigo-400 transition-colors"
            />
          </div>
          <span className="text-xs text-gray-400 font-mono uppercase">{value}</span>
        </div>
      );
    }

    function SizeSelector({ sizes, selected, onSelect }) {
      return (
        <div className="flex gap-2 flex-wrap">
          {sizes.map((size) => (
            <button
              key={size}
              onClick={() => onSelect(size)}
              className={`px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200 cursor-pointer ${
                selected === size
                  ? "bg-indigo-600 text-white shadow-md shadow-indigo-200"
                  : "bg-gray-100 text-gray-600 hover:bg-gray-200"
              }`}
            >
              {size}px
            </button>
          ))}
        </div>
      );
    }

    // ========================================
    // Page Components
    // ========================================

    function QRGenerator() {
      const [url, setUrl] = useState("");
      const [error, setError] = useState("");
      const [qrSize, setQrSize] = useState(256);
      const [fgColor, setFgColor] = useState("#000000");
      const [bgColor, setBgColor] = useState("#ffffff");
      const [generated, setGenerated] = useState(false);
      const qrRef = useRef(null);
      const qrInstanceRef = useRef(null);

      const validateUrl = useCallback((input) => {
        if (!input.trim()) {
          return "URL을 입력해 주세요.";
        }
        if (!/^https?:\/\//i.test(input)) {
          return "URL은 http:// 또는 https://로 시작해야 합니다.";
        }
        try {
          new URL(input);
        } catch {
          return "올바른 URL 형식이 아닙니다.";
        }
        return "";
      }, []);

      const generateQR = useCallback(() => {
        const validationError = validateUrl(url);
        if (validationError) {
          setError(validationError);
          setGenerated(false);
          return;
        }
        setError("");

        // Clear previous QR code
        if (qrRef.current) {
          qrRef.current.innerHTML = "";
        }
        if (qrInstanceRef.current) {
          qrInstanceRef.current.clear();
          qrInstanceRef.current = null;
        }

        // Generate new QR code
        qrInstanceRef.current = new QRCode(qrRef.current, {
          text: url,
          width: qrSize,
          height: qrSize,
          colorDark: fgColor,
          colorLight: bgColor,
          correctLevel: QRCode.CorrectLevel.H,
        });

        setGenerated(true);
      }, [url, qrSize, fgColor, bgColor, validateUrl]);

      const downloadQR = useCallback(() => {
        if (!qrRef.current) return;
        const canvas = qrRef.current.querySelector("canvas");
        if (canvas) {
          const link = document.createElement("a");
          link.download = `qrcode-${qrSize}px.png`;
          link.href = canvas.toDataURL("image/png");
          link.click();
          return;
        }
        const img = qrRef.current.querySelector("img");
        if (img) {
          const link = document.createElement("a");
          link.download = `qrcode-${qrSize}px.png`;
          link.href = img.src;
          link.click();
        }
      }, [qrSize]);

      const handleKeyDown = useCallback((e) => {
        if (e.key === "Enter") {
          generateQR();
        }
      }, [generateQR]);

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 py-8 sm:py-16 px-4">
          <div className="max-w-xl mx-auto">
            {/* Header */}
            <div className="text-center mb-8 sm:mb-12">
              <div className="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 rounded-2xl mb-4">
                <svg className="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                </svg>
              </div>
              <h1 className="text-3xl sm:text-4xl font-bold text-gray-900 tracking-tight">QR 코드 생성기</h1>
              <p className="mt-3 text-gray-500 text-base sm:text-lg">URL을 입력하면 QR 코드로 변환해 드립니다</p>
            </div>

            {/* Main Card */}
            <Card className="mb-6">
              {/* URL Input */}
              <div onKeyDown={handleKeyDown}>
                <Input
                  label="웹사이트 URL"
                  value={url}
                  onChange={(e) => {
                    setUrl(e.target.value);
                    if (error) setError("");
                  }}
                  placeholder="https://example.com"
                  error={error}
                />
              </div>

              {/* Options */}
              <div className="mt-6 space-y-5">
                {/* Size Selector */}
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">QR 코드 크기</label>
                  <SizeSelector sizes={[128, 256, 512]} selected={qrSize} onSelect={setQrSize} />
                </div>

                {/* Color Pickers */}
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-3">색상 설정</label>
                  <div className="flex gap-8 items-center">
                    <ColorPicker label="전경색" value={fgColor} onChange={(e) => setFgColor(e.target.value)} />
                    <ColorPicker label="배경색" value={bgColor} onChange={(e) => setBgColor(e.target.value)} />
                  </div>
                </div>
              </div>

              {/* Generate Button */}
              <div className="mt-8">
                <Button onClick={generateQR} size="lg" className="w-full">
                  <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
                  </svg>
                  QR 코드 생성
                </Button>
              </div>
            </Card>

            {/* QR Code Result */}
            {generated && (
              <Card className="text-center animate-fade-in">
                <h2 className="text-lg font-semibold text-gray-800 mb-5">생성된 QR 코드</h2>
                <div className="inline-flex items-center justify-center p-5 bg-gray-50 rounded-2xl border border-gray-100 mb-5">
                  <div id="qrcode-canvas" ref={qrRef}></div>
                </div>
                <p className="text-sm text-gray-400 mb-5 break-all px-4">{url}</p>
                <Button onClick={downloadQR} variant="success" size="md" className="w-full sm:w-auto">
                  <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                  </svg>
                  PNG 다운로드
                </Button>
              </Card>
            )}

            {/* Hidden QR container when not yet generated */}
            {!generated && <div ref={qrRef} className="hidden"></div>}

            {/* Footer */}
            <p className="text-center text-sm text-gray-400 mt-8">Enter 키를 눌러도 QR 코드가 생성됩니다</p>
          </div>
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================

    function App() {
      return <QRGenerator />;
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
